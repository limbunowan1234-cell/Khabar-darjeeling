<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit news to Khabar Darjeeling">
    <meta name="robots" content="noindex, follow">
    <title>Submit News - Khabar Darjeeling</title>
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <link rel="stylesheet" href="css/style.css?v=1000">
    <link rel="stylesheet" href="css/responsive.css?v=1000">
    <style>
        .upload-area { display: block; border: 2px dashed #ccc; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; background: #fafafa; transition: all 0.3s; }
        .upload-area:hover { border-color: #c41e3a; background: #fff5f5; }
        .upload-info p { margin: 0 0 5px 0; font-size: 16px; }
        .upload-info small { color: #666; }
        .image-preview { margin-top: 15px; }
        .image-preview img { max-width: 300px; max-height: 200px; border-radius: 8px; border: 1px solid #ddd; display: block; margin-bottom: 10px; }
        .remove-btn { padding: 6px 12px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .remove-btn:hover { background: #c82333; }
        .user-lock-banner { display: flex; align-items: center; gap: 12px; background: #f0f2f5; padding: 14px; border-radius: 6px; border-left: 4px solid #1877f2; margin-bottom: 20px; }
        body.dark-theme .user-lock-banner { background: #242526; border-left-color: #c41e3a; }
        .user-lock-avatar { width: 40px; height: 40px; background: #c41e3a; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <div class="logo">
                    <h1>खबर दार्जिलिंग</h1>
                    <p class="tagline">Your Trusted News Source</p>
                </div>
                <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
                <div class="nav-menu" id="navMenu">
                    <ul class="nav-links">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="submit.html" class="active">Submit News</a></li>
                    </ul>
                </div>
                <div class="nav-right">
                    <button class="theme-toggle" id="themeToggle">🌙</button>
                    <a href="admin.html" class="admin-link">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="submit-section">
        <div class="container">
            <div class="submit-container">
                <h2>Submit News</h2>
                <div class="user-lock-banner">
                    <div class="user-lock-avatar" id="authorAvatar">...</div>
                    <div>
                        <p style="margin:0; font-weight:600; font-size:14px;" id="authorDisplayLabel">Loading profile...</p>
                        <p style="margin:0; font-size:11px; color:#606770;">Verified Publishing Identity (Locked)</p>
                    </div>
                </div>

                <form id="newsForm" class="news-form">
                    <div class="form-group">
                        <label for="title">News Title *</label>
                        <input type="text" id="title" required placeholder="Enter news headline" maxlength="200">
                    </div>
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" required>
                            <option value="">Select a category</option>
                            <option value="darjeeling">Darjeeling</option>
                            <option value="kalimpong">Kalimpong</option>
                            <option value="kurseong">Kurseong</option>
                            <option value="west-bengal">West Bengal</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location">Location *</label>
                        <input type="text" id="location" required placeholder="Where is this news from?">
                    </div>
                    <div class="form-group">
                        <label for="content">News Content *</label>
                        <textarea id="content" required placeholder="Write your news story here..." rows="10" minlength="50"></textarea>
                    </div>
                    <div class="form-group checkbox">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree that this news is accurate</label>
                    </div>
                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary" id="submitBtn">Submit News</button>
                    </div>
                </form>

                <div id="successMessage" class="alert alert-success" style="display:none;">
                    <h4>✓ News Submitted Successfully!</h4>
                    <p>Your news is being reviewed. Check your Discord for the alert!</p>
                    <button onclick="location.href='index.html'" class="btn btn-primary">Back to Home</button>
                </div>
                <div id="errorMessage" class="alert alert-error" style="display:none;"><p id="errorText"></p></div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.min.js"></script>
    <script src="js/appwrite.js?v=1000"></script>
    
    <script>
        let verifiedUserSession = null;
        const discordWebhookUrl = "https://discord.com/api/webhooks/1511823519166759023/gaOpmYw3IqkOMdLg3uIwrNASCSFYQrDSJQ-ZFcVQLl6A6fseFFKrmNo350qHkiZeGx7W";

        function verifyUserSessionState(retries = 0) {
            if (window.account) {
                window.account.get()
                    .then(user => {
                        verifiedUserSession = user;
                        document.getElementById('authorDisplayLabel').textContent = `${user.name} (${user.email})`;
                        document.getElementById('authorAvatar').textContent = user.name ? user.name.charAt(0).toUpperCase() : '👤';
                    })
                    .catch(() => window.location.href = 'login.html');
            } else if (retries < 30) {
                setTimeout(() => verifyUserSessionState(retries + 1), 100);
            }
        }
        verifyUserSessionState();

        document.getElementById('newsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');

            submitBtn.disabled = true;
            submitBtn.textContent = "Publishing...";

            try {
                const title = document.getElementById('title').value.trim();
                const category = document.getElementById('category').value;
                const location = document.getElementById('location').value.trim();
                const content = document.getElementById('content').value.trim();

                // 1. Save to Appwrite
                await window.databases.createDocument(
                    window.APPWRITE_DB_ID,
                    window.APPWRITE_COLLECTION_ID,
                    window.ID.unique(),
                    {
                        title, category, content, location, status: "pending",
                        authorName: verifiedUserSession.name,
                        authorEmail: verifiedUserSession.email
                    }
                );

                // 2. Fire Discord Notification
                const discordPayload = {
                    embeds: [{
                        title: "🚨 New Article Submitted!",
                        color: 12852794,
                        fields: [
                            { name: "📰 Headline", value: title },
                            { name: "👤 Author", value: verifiedUserSession.name, inline: true },
                            { name: "📍 Location", value: location, inline: true }
                        ],
                        footer: { text: "Khabar Darjeeling Portal Control" },
                        timestamp: new Date().toISOString()
                    }]
                };

                fetch(discordWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(discordPayload)
                });

                document.getElementById('newsForm').style.display = 'none';
                document.querySelector('.user-lock-banner').style.display = 'none';
                successMsg.style.display = 'block';

            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit News";
                document.getElementById('errorText').textContent = error.message;
                errorMsg.style.display = 'block';
            }
        });

        document.getElementById('navToggle')?.addEventListener('click', () => document.getElementById('navMenu').classList.toggle('active'));
    </script>
</body>
</html>
