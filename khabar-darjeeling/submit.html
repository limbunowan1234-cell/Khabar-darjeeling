<script src="js/appwrite.js?v=1000"></script>

<script>
    // --- Use your existing appwrite.js setup ---
    // expects: window.databases, window.ID, window.APPWRITE_DB_ID,
    // window.APPWRITE_COLLECTION_ID, submitStorage, verifiedUserSession

    // Better YouTube extractor (handles shorts, youtu.be, embed)
    function extractVideoID(url) {
        if (!url) return null;
        const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/))([a-zA-Z0-9_-]{11})/);
        return match? match[1] : (url.length === 11? url : null);
    }

    // --- Auth banner (uses your verifiedUserSession from appwrite.js) ---
    async function updateAuthorBanner() {
        // your appwrite.js already checks login, we just display it
        const check = setInterval(() => {
            if (typeof verifiedUserSession!== 'undefined' && verifiedUserSession) {
                document.getElementById('authorDisplayLabel').textContent = `Posting as ${verifiedUserSession.name}`;
                document.getElementById('authorAvatar').textContent = verifiedUserSession.name.charAt(0).toUpperCase();
                clearInterval(check);
            }
        }, 100);

        // fallback after 2s if not logged in
        setTimeout(() => {
            if (document.getElementById('authorDisplayLabel').textContent.includes('Loading')) {
                document.getElementById('authorDisplayLabel').textContent = 'Posting as Guest';
                document.getElementById('authorAvatar').textContent = 'G';
            }
        }, 2000);
    }

    // --- Image Preview ---
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    const removeBtn = document.getElementById('removeImageBtn');

    imageInput.addEventListener('change', () => {
        const file = imageInput.files[0];
        if (file) {
            if (file.size > 5 * 1024 * 1024) {
                alert('Image must be under 5MB for mobile');
                imageInput.value = '';
                return;
            }
            previewImg.src = URL.createObjectURL(file);
            imagePreview.style.display = 'block';
        }
    });

    removeBtn.addEventListener('click', () => {
        imageInput.value = '';
        imagePreview.style.display = 'none';
        previewImg.src = '';
    });

    // --- Submit ---
    const newsForm = document.getElementById('newsForm');
    const submitBtn = document.getElementById('submitBtn');

    newsForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';
        document.getElementById('successMessage').style.display = 'none';
        document.getElementById('errorMessage').style.display = 'none';

        try {
            const imageFile = imageInput.files[0];
            let uploadedImageId = null;

            if (imageFile) {
                submitBtn.textContent = 'Uploading image...';
                // using your submitStorage from appwrite.js
                const uploadResponse = await submitStorage.createFile('article-image', Appwrite.ID.unique(), imageFile);
                uploadedImageId = uploadResponse.$id;
            }

            const ytLink = document.getElementById('ytLink').value.trim();

            const articlePayload = {
                title: document.getElementById('title').value.trim(),
                category: document.getElementById('category').value,
                content: document.getElementById('content').value.trim(),
                location: document.getElementById('location').value.trim(),
                status: "pending",
                authorName: verifiedUserSession?.name || "Guest",
                authorEmail: verifiedUserSession?.email || "guest@khabardarjeeling.com",
                submittedAt: new Date().toISOString(),
                imageFileId: uploadedImageId,
                youtube_id: extractVideoID(ytLink) // now saves clean 11-char ID
            };

            submitBtn.textContent = 'Saving...';
            await window.databases.createDocument(
                window.APPWRITE_DB_ID,
                window.APPWRITE_COLLECTION_ID,
                window.ID.unique(),
                articlePayload
            );

            document.getElementById('successMessage').style.display = 'block';
            newsForm.reset();
            imagePreview.style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (error) {
            console.error("Submit failed:", error);
            document.getElementById('errorText').textContent = error.message;
            document.getElementById('errorMessage').style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit News';
        }
    });

    updateAuthorBanner();
</script>
