<script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- Safe YouTube extractor ---
        function extractVideoID(url) {
            if (!url) return null;
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/))([a-zA-Z0-9_-]{11})/);
            return match? match[1] : (url.length === 11? url : null);
        }

        // --- Auth banner ---
        async function updateAuthorBanner() {
            const label = document.getElementById('authorDisplayLabel');
            const avatar = document.getElementById('authorAvatar');
            if (!label ||!avatar) return;

            try {
                const user = await window.account.get();
                window.verifiedUserSession = user;
                label.textContent = `Posting as ${user.name}`;

                // ✅ If user has avatar, show it. Else show initials
                if (user.prefs?.avatar) {
                    avatar.style.backgroundImage = `url(${user.prefs.avatar})`;
                    avatar.style.backgroundSize = 'cover';
                    avatar.textContent = '';
                } else {
                    avatar.textContent = user.name.charAt(0).toUpperCase();
                }
            } catch (e) {
                label.textContent = 'Posting as Guest';
                avatar.textContent = 'G';
            }
        }

        // --- Image Preview ---
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const removeBtn = document.getElementById('removeImageBtn');

        if (imageInput && imagePreview && previewImg) {
            imageInput.addEventListener('change', () => {
                const file = imageInput.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) {
                    alert('Image must be under 5MB for mobile');
                    imageInput.value = '';
                    return;
                }
                previewImg.src = URL.createObjectURL(file);
                imagePreview.style.display = 'block';
            });
        }

        if (removeBtn && imageInput && imagePreview && previewImg) {
            removeBtn.addEventListener('click', () => {
                imageInput.value = '';
                imagePreview.style.display = 'none';
                previewImg.src = '';
            });
        }

        // --- Submit with Author Data ---
        const newsForm = document.getElementById('newsForm');
        const submitBtn = document.getElementById('submitBtn');

        if (newsForm && submitBtn) {
            newsForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';
                document.getElementById('successMessage').style.display = 'none';
                document.getElementById('errorMessage').style.display = 'none';

                try {
                    if (!window.Appwrite ||!window.databases ||!window.storage) {
                        throw new Error('Appwrite not loaded. Refresh page.');
                    }

                    const user = await window.account.get(); // ✅ Get logged-in user

                    const imageFile = imageInput?.files[0];
                    let uploadedImageId = null;

                    if (imageFile) {
                        submitBtn.textContent = 'Uploading image...';
                        const uploadResponse = await window.storage.createFile(
                            window.APPWRITE_BUCKET_ID || 'article-image',
                            window.ID.unique(),
                            imageFile
                        );
                        uploadedImageId = uploadResponse.$id;
                    }

                    const ytLink = document.getElementById('ytLink')?.value.trim() || '';

                    const articlePayload = {
                        title: document.getElementById('title').value.trim(),
                        category: document.getElementById('category').value,
                        content: document.getElementById('content').value.trim(),
                        location: document.getElementById('location').value.trim(),
                        status: "pending",

                        // ✅ NEW: Save actual submitter data
                        submitterId: user.$id,
                        submitterName: user.name,
                        submitterAvatar: user.prefs?.avatar || null, // null if no pic
                        submitterEmail: user.email,

                        submittedAt: new Date().toISOString(),
                        imageFileId: uploadedImageId,
                        youtube_id: extractVideoID(ytLink)
                    };

                    submitBtn.textContent = 'Saving...';
                    await window.databases.createDocument(
                        window.APPWRITE_DB_ID,
                        window.APPWRITE_COLLECTION_ID,
                        window.ID.unique(),
                        articlePayload
                    );

                    document.getElementById('successMessage').style.display = 'block';
                    newsForm.style.display = 'none';
                    window.scrollTo({ top: 0, behavior: 'smooth' });

                } catch (error) {
                    console.error("Submit failed:", error);
                    const errorMsg = error.response?.message || error.message || "Unknown error occurred.";
                    document.getElementById('errorText').textContent = errorMsg;
                    document.getElementById('errorMessage').style.display = 'block';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit News';
                }
            });
        }

        updateAuthorBanner();

        // Nav Toggle
        document.getElementById('navToggle')?.addEventListener('click', () => {
            document.getElementById('navMenu').classList.toggle('active');
        });

        // Theme Toggle
        document.getElementById('themeToggle')?.addEventListener('click', function() {
            document.body.classList.toggle('dark-theme');
            this.textContent = document.body.classList.contains('dark-theme')? '☀️' : '🌙';
        });
    });
</script>
