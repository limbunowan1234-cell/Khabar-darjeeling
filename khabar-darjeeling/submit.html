<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Submit News - Khabar Darjeeling">
    <meta name="theme-color" content="#c41e3a">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/logo.png">

    <title>Submit News - खबर दार्जिलिंग</title>
    <link rel="stylesheet" href="css/style.css?v=117">
    <link rel="stylesheet" href="css/responsive.css?v=117">

    <style>
        #gatekeeperLoader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #ffffff; z-index: 99999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            font-family: sans-serif; transition: opacity 0.3s ease;
        }
        body.dark-mode #gatekeeperLoader { background: #1a1a1a; color: #ffffff; }

        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(196, 30, 58, 0.1);
            border-left-color: #c41e3a; border-radius: 50%; animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .submit-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        body.dark-mode .submit-container { background: #2a2a2a; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        body.dark-mode .form-group label { color: #ddd; }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        body.dark-mode .form-group input,
        body.dark-mode .form-group select,
        body.dark-mode .form-group textarea {
            background: #1a1a1a;
            border-color: #444;
            color: #fff;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #c41e3a;
        }

        .form-group textarea { min-height: 200px; resize: vertical; }

        .image-preview {
            margin-top: 10px;
            max-width: 300px;
            border-radius: 8px;
            display: none;
        }

        .submit-btn {
            background: #c41e3a;
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .submit-btn:hover { background: #a01729; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

        .user-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        body.dark-mode .user-info { background: #333; }

        .user-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #c41e3a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div id="gatekeeperLoader">
        <div class="spinner"></div>
        <p style="font-weight: 600; letter-spacing: 0.5px;">Verifying Session...</p>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <div class="logo">
                    <a href="index.html" style="display:flex;align-items:center;text-decoration:none;gap:12px;">
                        <img src="assets/logo.png" alt="Khabar Darjeeling Logo" style="height:55px;width:55px;object-fit:cover;border-radius:50%;flex-shrink:0;">
                        <div>
                            <h1 style="font-size:24px;color:var(--primary-color);margin:0;line-height:1.2;">खबर दार्जिलिंग</h1>
                            <p class="tagline" style="margin:0;font-size:11px;color:var(--text-light);font-weight:500;">Hamro Khabar, Hami Lekhaw</p>
                        </div>
                    </a>
                </div>

                <div class="nav-right">
                    <a href="index.html" class="admin-link" style="text-decoration:none;">Home</a>
                    <button id="logoutBtn" style="background:none;border:none;color:#c41e3a;font-weight:600;font-size:14px;cursor:pointer;margin-left:15px;padding:5px 10px;font-family:inherit;">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="submit-container">
            <h2 style="margin-top:0;margin-bottom:10px;color:#c41e3a;">Submit News Article</h2>
            <p style="color:#666;margin-bottom:25px;">Share news from your community. All submissions are reviewed before publishing.</p>

            <div id="userInfo" class="user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <div>
                    <div style="font-weight:600;" id="userName">Loading...</div>
                    <div style="font-size:13px;color:#666;" id="userEmail"></div>
                </div>
            </div>

            <div id="alertBox" class="alert"></div>

            <form id="submitForm">
                <div class="form-group">
                    <label for="title">Article Title *</label>
                    <input type="text" id="title" name="title" required maxlength="200"
                           placeholder="Enter a clear, descriptive headline">
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="darjeeling">Darjeeling</option>
                        <option value="kalimpong">Kalimpong</option>
                        <option value="kurseong">Kurseong</option>
                        <option value="mirik">Mirik</option>
                        <option value="siliguri">Siliguri</option>
                        <option value="west-bengal">West Bengal</option>
                        <option value="national">National</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="sports">Sports</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">Location *</label>
                    <input type="text" id="location" name="location" required maxlength="100"
                           placeholder="e.g., Darjeeling Town, Kalimpong, etc.">
                </div>

                <div class="form-group">
                    <label for="content">Article Content *</label>
                    <textarea id="content" name="content" required minlength="100"
                              placeholder="Write your news article here. Minimum 100 characters."></textarea>
                </div>

                <div class="form-group">
                    <label for="image">Featured Image (Optional)</label>
                    <input type="file" id="image" name="image" accept="image/*">
                    <img id="imagePreview" class="image-preview" alt="Preview">
                    <small style="color:#666;display:block;margin-top:5px;">Max 5MB. JPG, PNG, or WebP.</small>
                </div>

                <div class="form-group">
                    <label for="youtubeUrl">YouTube Video URL (Optional)</label>
                    <input type="url" id="youtubeUrl" name="youtubeUrl"
                           placeholder="https://www.youtube.com/watch?v=...">
                    <small style="color:#666;display:block;margin-top:5px;">Add a YouTube video to accompany your article.</small>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Submit for Review</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.min.js"></script>
    <script src="js/appwrite.js?v=117"></script>

    <script>
        (() => {
            if (!window.account || !window.databases || !window.storage || !window.ID || !window.Query) {
                alert('Appwrite failed to load. Please refresh the page.');
                window.location.href = 'login.html';
                return;
            }

            const account = window.account;
            const databases = window.databases;
            const storage = window.storage;
            const ID = window.ID;
            const Query = window.Query;

            const DB_ID = window.APPWRITE_DB_ID;
            const COLLECTION_ID = window.APPWRITE_COLLECTION_ID;
            const BUCKET_ID = window.APPWRITE_BUCKET_ID;
            const PROFILES_COLLECTION = 'profiles';

            let currentUser = null;
            let uploadedImageId = null;

            async function ensureProfileExists(user) {
                try {
                    const existing = await databases.listDocuments(DB_ID, PROFILES_COLLECTION, [
                        Query.equal('userId', user.$id),
                        Query.limit(1)
                    ]);

                    if (existing.documents.length === 0) {
                        const safeName = (user.name || (user.email ? user.email.split('@')[0] : 'Reporter')).trim();
                        const safeUserName =
                            safeName.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 20) +
                            Math.floor(Math.random() * 1000);

                        await databases.createDocument(
                            DB_ID,
                            PROFILES_COLLECTION,
                            ID.unique(),
                            {
                                userId: user.$id,
                                displayName: safeName,
                                userName: safeUserName,
                                bio: 'Reporter at Khabar Darjeeling',
                                avatarUrl: null,
                                coverUrl: null,
                                joinedAT: new Date().toISOString()
                            }
                        );
                    }
                } catch (e) {
                    console.warn('Profile check failed:', e);
                }
            }

            async function initGatekeeper() {
                try {
                    currentUser = await account.get();
                    await ensureProfileExists(currentUser);
                    showUserInfo(currentUser);
                    hideLoader();
                } catch (error) {
                    window.location.href = 'login.html';
                }
            }

            function showUserInfo(user) {
                const safeName = user.name || (user.email ? user.email.split('@')[0] : 'Reporter');
                document.getElementById('userName').textContent = safeName;
                document.getElementById('userEmail').textContent = user.email || '';
                const initials = safeName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) || 'R';
                document.getElementById('userAvatar').textContent = initials;
            }

            function hideLoader() {
                const loader = document.getElementById('gatekeeperLoader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 300);
                }
            }

            function showAlert(message, type = 'success') {
                const alertBox = document.getElementById('alertBox');
                alertBox.textContent = message;
                alertBox.className = `alert ${type}`;
                alertBox.style.display = 'block';
                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 5000);
            }

            function extractYouTubeID(url) {
                if (!url) return null;
                const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
                const match = url.match(regex);
                return match ? match[1] : null;
            }

            document.getElementById('image').addEventListener('change', function (e) {
                const file = e.target.files[0];
                const preview = document.getElementById('imagePreview');

                if (file) {
                    if (file.size > 5 * 1024 * 1024) {
                        showAlert('Image must be less than 5MB', 'error');
                        e.target.value = '';
                        preview.style.display = 'none';
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = ev => {
                        preview.src = ev.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                } else {
                    preview.style.display = 'none';
                }
            });

            document.getElementById('submitForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';

                try {
                    const title = document.getElementById('title').value.trim();
                    const category = document.getElementById('category').value;
                    const content = document.getElementById('content').value.trim();
                    const location = document.getElementById('location').value.trim();
                    const youtubeUrl = document.getElementById('youtubeUrl').value.trim();
                    const imageFile = document.getElementById('image').files[0];

                    if (!title || !category || !content || !location) {
                        throw new Error('Please fill all required fields.');
                    }

                    if (content.length < 100) {
                        throw new Error('Article content must be at least 100 characters long.');
                    }

                    if (imageFile) {
                        const fileUpload = await storage.createFile(BUCKET_ID, ID.unique(), imageFile);
                        uploadedImageId = fileUpload.$id;
                    }

                    let userAvatar = null;
                    try {
                        const profile = await databases.listDocuments(DB_ID, PROFILES_COLLECTION, [
                            Query.equal('userId', currentUser.$id),
                            Query.limit(1)
                        ]);
                        if (profile.documents.length > 0) {
                            userAvatar = profile.documents[0].avatarUrl || null;
                        }
                    } catch (e) {
                        console.warn('Could not load profile avatar:', e);
                    }

                    const articlePayload = {
                        title,
                        category,
                        content,
                        location,
                        status: 'pending',
                        submitterId: currentUser.$id,
                        submitterName: currentUser.name || 'Reporter',
                        submitterAvatar: userAvatar,
                        submitterEmail: currentUser.email || '',
                        authorName: currentUser.name || 'Reporter',
                        authorEmail: currentUser.email || '',
                        submittedAt: new Date().toISOString(),
                        imageFileId: uploadedImageId,
                        youtube_id: extractYouTubeID(youtubeUrl)
                    };

                    await databases.createDocument(DB_ID, COLLECTION_ID, ID.unique(), articlePayload);

                    showAlert('Article submitted! It will be reviewed before publishing.', 'success');
                    document.getElementById('submitForm').reset();
                    document.getElementById('imagePreview').style.display = 'none';
                    uploadedImageId = null;
                } catch (error) {
                    console.error('Submission error:', error);
                    showAlert(error.message || 'Failed to submit article. Please try again.', 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit for Review';
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                if (!confirm('Are you sure you want to sign out?')) return;
                try {
                    await account.deleteSession('current');
                    window.location.href = 'login.html';
                } catch (error) {
                    alert('Failed to sign out. Please try again.');
                }
            });

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initGatekeeper);
            } else {
                initGatekeeper();
            }
        })();
    </script>
</body>
</html>
