<script>
        (() => {
            const client = window.client;
            const account = window.account;
            const databases = window.databases;
            const storage = window.storage;
            const ID = window.ID;
            const Query = window.Query;

            const DB_ID = window.APPWRITE_DB_ID;
            const COLLECTION_ID = window.APPWRITE_COLLECTION_ID;
            const BUCKET_ID = window.APPWRITE_BUCKET_ID;
            const PROFILES_COLLECTION = 'profiles'; // ✅ NEW

            let currentUser = null;
            let uploadedImageId = null;

            // Gatekeeper - check auth
            async function initGatekeeper() {
                try {
                    currentUser = await account.get();

                    // ✅ NEW: Auto-create profile if doesn't exist
                    await ensureProfileExists(currentUser);

                    showUserInfo(currentUser);
                    hideLoader();
                } catch (error) {
                    window.location.href = 'login.html';
                }
            }

            // ✅ NEW FUNCTION
            async function ensureProfileExists(user) {
                try {
                    const existing = await databases.listDocuments(DB_ID, PROFILES_COLLECTION, [
                        Query.equal('userId', user.$id),
                        Query.limit(1)
                    ]);

                    if (existing.documents.length === 0) {
                        await databases.createDocument(DB_ID, PROFILES_COLLECTION, ID.unique(), {
                            userId: user.$id,
                            displayName: user.name,
                            username: user.name.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 20) + Math.floor(Math.random() * 100),
                            bio: 'Reporter at Khabar Darjeeling',
                            avatarUrl: null,
                            coverUrl: null,
                            joinedAt: new Date().toISOString()
                        });
                        console.log('✅ Profile created for', user.name);
                    }
                } catch (e) {
                    console.log('Profile check failed:', e);
                }
            }

            function showUserInfo(user) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;

                const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                document.getElementById('userAvatar').textContent = initials;
            }

            function hideLoader() {
                const loader = document.getElementById('gatekeeperLoader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 300);
                }
            }

            function showAlert(message, type = 'success') {
                const alertBox = document.getElementById('alertBox');
                alertBox.textContent = message;
                alertBox.className = `alert ${type}`;
                alertBox.style.display = 'block';
                setTimeout(() => alertBox.style.display = 'none', 5000);
            }

            function extractYouTubeID(url) {
                if (!url) return null;
                const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
                const match = url.match(regex);
                return match? match[1] : null;
            }

            // Image preview
            document.getElementById('image').addEventListener('change', function(e) {
                const file = e.target.files[0];
                const preview = document.getElementById('imagePreview');

                if (file) {
                    if (file.size > 5 * 1024 * 1024) {
                        showAlert('Image must be less than 5MB', 'error');
                        e.target.value = '';
                        preview.style.display = 'none';
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                } else {
                    preview.style.display = 'none';
                }
            });

            // Form submission
            document.getElementById('submitForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';

                try {
                    const title = document.getElementById('title').value.trim();
                    const category = document.getElementById('category').value;
                    const content = document.getElementById('content').value.trim();
                    const location = document.getElementById('location').value.trim();
                    const youtubeUrl = document.getElementById('youtubeUrl').value.trim();
                    const imageFile = document.getElementById('image').files[0];

                    // Upload image if provided
                    if (imageFile) {
                        const fileUpload = await storage.createFile(BUCKET_ID, ID.unique(), imageFile);
                        uploadedImageId = fileUpload.$id;
                    }

                    // Get user profile for avatar
                    let userAvatar = null;
                    try {
                        const profile = await databases.listDocuments(DB_ID, PROFILES_COLLECTION, [
                            Query.equal('userId', currentUser.$id),
                            Query.limit(1)
                        ]);
                        if (profile.documents.length > 0) {
                            userAvatar = profile.documents[0].avatarUrl;
                        }
                    } catch(e) {}

                    // Build payload
                    const articlePayload = {
                        title: title,
                        category: category,
                        content: content,
                        location: location,
                        status: "pending",

                        // Auto-fill from logged-in user
                        submitterId: currentUser.$id,
                        submitterName: currentUser.name,
                        submitterAvatar: userAvatar,
                        submitterEmail: currentUser.email,

                        // Keep old fields for backward compatibility
                        authorName: currentUser.name,
                        authorEmail: currentUser.email,

                        submittedAt: new Date().toISOString(),
                        imageFileId: uploadedImageId,
                        youtube_id: extractYouTubeID(youtubeUrl)
                    };

                    await databases.createDocument(DB_ID, COLLECTION_ID, ID.unique(), articlePayload);

                    showAlert('Article submitted successfully! It will be reviewed before publishing.', 'success');
                    document.getElementById('submitForm').reset();
                    document.getElementById('imagePreview').style.display = 'none';
                    uploadedImageId = null;

                } catch (error) {
                    console.error('Submission error:', error);
                    showAlert('Failed to submit article. Please try again.', 'error');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit for Review';
                }
            });

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                if (confirm("Are you sure you want to sign out?")) {
                    try {
                        await account.deleteSession('current');
                        window.location.href = 'login.html';
                    } catch (error) {
                        alert("Failed to sign out. Please try again.");
                    }
                }
            });

            // Init
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initGatekeeper);
            } else {
                initGatekeeper();
            }

        })();
    </script>
