<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appwrite SDK Test</title>
  <style>
    body{font-family:Arial,sans-serif;padding:30px}
    .ok{color:green;font-weight:700}
    .bad{color:red;font-weight:700}
  </style>
</head>
<body>
  <h1>Appwrite SDK Test</h1>
  <p id="status">Checking...</p>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.min.js"></script>
  <script src="js/appwrite.js?v=126"></script>
  <script>
    const status = document.getElementById('status');
    status.innerHTML = window.Appwrite
      ? '<span class="ok">Appwrite loaded successfully.</span>'
      : '<span class="bad">Appwrite NOT loaded.</span>';
  </script>
</body>
</html>
