<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Debug</title>
<style>body{font-family:sans-serif;padding:16px}pre{background:#f0f0f0;padding:12px;overflow:auto}</style>
</head>
<body>
<h2>खबर दार्जिलिंग - Debug</h2>
<div id="status">Fetching...</div>
<pre id="out"></pre>

<script>
(async()=>{
  const url='https://nyc.cloud.appwrite.io/v1/databases/Khabar_db/collections/articles/documents?limit=10';
  const res=await fetch(url,{headers:{'X-Appwrite-Project':'khabardarjeeling'}});
  const data=await res.json();
  
  document.getElementById('status').textContent = `Found ${data.total||0} total, ${data.documents?.length||0} returned`;
  document.getElementById('out').textContent = JSON.stringify(data,null,2);
})();
</script>
</body>
</html>
