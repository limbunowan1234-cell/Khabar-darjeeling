<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appwrite Load Test</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      display:flex;
      min-height:100vh;
      align-items:center;
      justify-content:center;
      margin:0;
      background:#f6f6f6;
    }
    .box{
      text-align:center;
      background:#fff;
      padding:24px;
      border-radius:12px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      max-width:320px;
    }
    .ok{color:green;font-weight:700}
    .bad{color:red;font-weight:700}
  </style>
</head>
<body>
  <div class="box">
    <h1>Appwrite Load Test</h1>
    <p id="status">Checking...</p>
    <p id="detail"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@17.0.1"></script>
  <script>
    setTimeout(() => {
      const status = document.getElementById('status');
      const detail = document.getElementById('detail');

      if (window.Appwrite) {
        status.innerHTML = '<span class="ok">Appwrite loaded successfully.</span>';
        detail.textContent = 'Global namespace exists.';
      } else {
        status.innerHTML = '<span class="bad">Appwrite did not load.</span>';
        detail.textContent = 'Check CSP, CDN blocking, or cached files.';
      }
    }, 500);
  </script>
</body>
</html>
