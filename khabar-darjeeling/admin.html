<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Khabar Darjeeling</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        body { margin: 0; }
        .admin-container { display: flex; min-height: 100vh; }
        
        /* Login Screen */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-light);
            width: 100%;
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
        }
        .login-box h2 {
            color: var(--primary-color);
            margin-bottom: 25px;
            text-align: center;
        }
        
        /* Admin Panel */
        .admin-panel {
            display: none;
            width: 100%;
        }
        .sidebar {
            width: 250px;
            background: #2d2d2d;
            color: white;
            padding: 20px 0;
        }
        .sidebar h3 {
            padding: 0 20px;
            margin-bottom: 20px;
            color: var(--primary-color);
        }
        .menu-item {
            display: block;
            padding: 12px 20px;
            color: #e0e0e0;
            text-decoration: none;
            transition: background 0.3s;
            cursor: pointer;
        }
        .menu-item:hover, .menu-item.active {
            background: var(--primary-color);
        }
        .main-content {
            flex: 1;
            padding: 30px;
            background: #f5f5f5;
        }
        .admin-header {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .stat-card h3 {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
        }
        .tab-content {
            display: none;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .tab-content.active {
            display: block;
        }
        .article-card {
            display: flex;
            gap: 20px;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }
        .article-card:last-child {
            border-bottom: none;
        }
        .article-content {
            flex: 1;
        }
        .btn-approve {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-reject {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>खबर दार्जिलिंग Admin</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
                <p id="loginError" style="color:red; margin-top:15px; display:none;"></p>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="sidebar">
            <h3>Admin Panel</h3>
            <a class="menu-item active" onclick="showTab('dashboard')">📊 Dashboard</a>
            <a class="menu-item" onclick="showTab('pending')">⏳ Pending Articles</a>
            <a class="menu-item" onclick="showTab('published')">✅ Published</a>
            <a class="menu-item" onclick="showTab('rejected')">❌ Rejected</a>
            <a class="menu-item" onclick="showTab('categories')">📁 Categories</a>
        </div>

        <div class="main-content">
            <div class="admin-header">
                <div>
                    <h2>खबर दार्जिलिंग Admin</h2>
                    <p style="color:#666;margin:5px 0 0 0;">Logged in as: <span id="adminUser"></span></p>
                </div>
                <div>
                    <a href="index.html" class="btn btn-secondary">Back to Site</a>
                    <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                </div>
            </div>

            <!-- Dashboard Tab -->
            <div id="dashboard" class="tab-content active">
                <h3>Dashboard</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Articles</h3>
                        <div class="number" id="totalArticles">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Pending Review</h3>
                        <div class="number" id="pendingCount">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Published</h3>
                        <div class="number" id="publishedCount">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Rejected</h3>
                        <div class="number" id="rejectedCount">0</div>
                    </div>
                </div>
            </div>

            <!-- Pending Tab -->
            <div id="pending" class="tab-content">
                <h3>Pending Articles</h3>
                <div id="pendingArticlesList"></div>
            </div>

            <!-- Published Tab -->
            <div id="published" class="tab-content">
                <h3>Published Articles</h3>
                <div id="publishedArticlesList"></div>
            </div>

            <!-- Rejected Tab -->
            <div id="rejected" class="tab-content">
                <h3>Rejected Articles</h3>
                <div id="rejectedArticlesList"></div>
            </div>

            <!-- Categories Tab -->
            <div id="categories" class="tab-content">
                <h3>Categories</h3>
                <div id="categoriesList"></div>
            </div>
        </div>
    </div>

    <!-- IMPORTANT: Load Appwrite first, then set globals -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.min.js"></script>
    <script>
        // Make Appwrite available globally for Cloudflare
        const { Client, Databases, Storage, Account, ID, Query } = Appwrite;
        
        const client = new Client();
        client
            .setEndpoint('https://nyc.cloud.appwrite.io/v1')
            .setProject('68b43d61001a7c0b6c68');
        
        // Set globals for admin.js
        window.account = new Account(client);
        window.database = new Databases(client);
        window.storage = new Storage(client);
        window.Appwrite = Appwrite;
        
        const APPWRITE_DB_ID = '68b44bf2000e26f021d3';
        const APPWRITE_COLLECTION_ID = 'articles';
    </script>
    <script src="js/admin.js"></script>
</body>
</html>
