<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Khabar Darjeeling Admin Panel - Manage news submissions and articles">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Prevent caching during development -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <title>Khabar Darjeeling - Admin Panel</title>
    
    <!-- Links to improved stylesheets -->
    <link rel="stylesheet" href="css/admin.css?v=1">
    
    <style>
        /* Inline only for critical initial page styling */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: white;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="admin-header" role="banner">
    <div class="header-content">
        <div class="header-left">
            <h1>Khabar Darjeeling</h1>
            <p>Admin Panel</p>
        </div>
        <div class="header-right">
            <div class="user-info">
                <strong id="adminName">Loading...</strong>
                <small id="adminEmail">-</small>
            </div>
            <button id="logoutBtn" class="btn btn-logout" aria-label="Logout from admin panel">
                🚪 Logout
            </button>
        </div>
    </div>
</header>

<!-- MAIN CONTAINER -->
<main class="container" role="main">
    <div class="admin-panel">
        <!-- SECTION HEADER -->
        <div class="section-header">
            <h2>📋 Pending Articles</h2>
            <div class="stats-group">
                <div class="stat">
                    <span class="stat-label">Pending</span>
                    <span class="stat-value" id="pendingCount">0</span>
                </div>
            </div>
        </div>

        <!-- ARTICLE LIST CONTAINER -->
        <div class="pending-list" id="pendingList" role="region" aria-label="Pending articles list">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading articles...</p>
            </div>
        </div>
    </div>
</main>

<!-- Scripts -->
<!-- 1. Appwrite configuration and SDK -->
<script src="js/appwrite.js"></script>

<!-- 2. Improved admin panel with all fixes -->
<script src="js/admin.js"></script>

</body>
</html>
