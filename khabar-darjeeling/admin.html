<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin • खबर दार्जिलिंग</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#c41e3a;--bg:#f0f2f5;--card:#fff;--text:#1c1e21;--muted:#606770;--border:#dddfe2}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--card);padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center}
.header h1{color:var(--red);font-size:20px}
.container{max-width:1000px;margin:20px auto;padding:0 16px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.menu-item{padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-weight:600}
.menu-item.active{background:var(--red);color:#fff;border-color:var(--red)}
.tab-content{display:none;background:var(--card);padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tab-content.active{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.stat{background:var(--bg);padding:16px;border-radius:10px;text-align:center}
.stat h3{font-size:28px;color:var(--red)}
.stat p{color:var(--muted);font-size:13px}
.article-card{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border)}
.article-card img{width:100px;height:70px;object-fit:cover;border-radius:6px}
.article-content h3{font-size:16px;margin-bottom:4px}
.btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600}
.btn-red{background:var(--red);color:#fff}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--card);padding:32px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);width:100%;max-width:360px}
.login-box h2{color:var(--red);margin-bottom:16px;text-align:center}
.login-box input{width:100%;padding:12px;margin-bottom:12px;border:1px solid var(--border);border-radius:8px}
.status-box{padding:10px;border-radius:6px;margin-bottom:12px;display:none;font-size:13px}
.status-box.error{background:#ffe1e5;color:#8b1025;display:block}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-wrap" style="display:none">
  <div class="login-box">
    <h2>Admin Login</h2>
    <div id="loginError" class="status-box"></div>
    <form id="loginForm">
      <input type="email" id="email" placeholder="nowanad@gmail.com" required>
      <input type="password" id="password" placeholder="Password" required>
      <button class="btn btn-red" style="width:100%">Login</button>
    </form>
  </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" style="display:none">
  <div class="header">
    <h1>खबर दार्जिलिंग Admin</h1>
    <div>
      <span id="adminUser" style="margin-right:12px;font-size:13px;color:var(--muted)"></span>
      <button id="logoutBtn" class="btn">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="tabs">
      <div class="menu-item active" onclick="showTab('dashboard')">Dashboard</div>
      <div class="menu-item" onclick="showTab('published')">Published</div>
      <a href="post.html" class="menu-item" style="text-decoration:none">+ New Post</a>
    </div>

    <div id="dashboard" class="tab-content active">
      <div class="stats">
        <div class="stat"><h3 id="totalArticles">0</h3><p>Total Posts</p></div>
        <div class="stat"><h3 id="publishedCount">0</h3><p>Published</p></div>
      </div>
    </div>

    <div id="published" class="tab-content">
      <div id="publishedArticlesList">Loading...</div>
    </div>
  </div>
</div>

<script src="js/admin.js?v=5"></script>
</body>
</html>
