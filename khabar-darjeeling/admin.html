<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Post News • खबर दार्जिलिंग</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css?v=1">
</head>
<body>
<header class="topbar">
  <a href="/">← Home</a>
  <h1>Post News</h1>
  <button id="logoutBtn">Logout</button>
</header>

<main class="wrap">
  <form id="postForm" class="card">
    <input id="title" type="text" placeholder="Headline (e.g. Darjeeling traffic...)" required>
    <select id="category" required>
      <option value="">Category</option>
      <option>Darjeeling</option><option>Kalimpong</option><option>Kurseong</option>
      <option>Siliguri</option><option>Politics</option><option>Sports</option>
    </select>
    <input id="location" type="text" placeholder="Location (e.g. Main Bazar)">
    <textarea id="content" rows="8" placeholder="Full news content..." required></textarea>
    <label class="file">Add Photo (optional)<input id="image" type="file" accept="image/*"></label>
    <button type="submit" id="submitBtn">Publish</button>
    <p id="status"></p>
  </form>
</main>

<script src="js/admin.js?v=1"></script>
</body>
</html>
