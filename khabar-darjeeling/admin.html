<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Dashboard - Khabar Darjeeling</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <h1>खबर दार्जिलिंग</h1>
            <h2>Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="loginError" class="error-text" style="display:none;"></p>
            </form>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel" style="display:none;">
        <!-- Admin Navbar -->
        <nav class="admin-navbar">
            <div class="admin-navbar-content">
                <h2>Admin Panel</h2>
                <div class="admin-nav-right">
                    <span id="adminUser"></span>
                    <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                </div>
            </div>
        </nav>

        <div class="admin-container">
            <!-- Sidebar -->
            <aside class="admin-sidebar">
                <ul class="admin-menu">
                    <li><a href="#" onclick="showTab('dashboard')" class="menu-item active">📊 Dashboard</a></li>
                    <li><a href="#" onclick="showTab('pending')" class="menu-item">⏳ Pending News</a></li>
                    <li><a href="#" onclick="showTab('approved')" class="menu-item">✓ Published</a></li>
                    <li><a href="#" onclick="showTab('rejected')" class="menu-item">✗ Rejected</a></li>
                    <li><a href="#" onclick="showTab('categories')" class="menu-item">📁 Categories</a></li>
                </ul>
            </aside>

            <!-- Main Content -->
            <main class="admin-main">
                <!-- Dashboard Tab -->
                <div id="dashboard" class="tab-content active">
                    <h3>Dashboard</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h4>Total Articles</h4>
                            <p id="totalArticles">0</p>
                        </div>
                        <div class="stat-card">
                            <h4>Pending Review</h4>
                            <p id="pendingCount">0</p>
                        </div>
                        <div class="stat-card">
                            <h4>Published</h4>
                            <p id="publishedCount">0</p>
                        </div>
                        <div class="stat-card">
                            <h4>Rejected</h4>
                            <p id="rejectedCount">0</p>
                        </div>
                    </div>
                </div>

                <!-- Pending News Tab -->
                <div id="pending" class="tab-content">
                    <h3>Pending News Review</h3>
                    <div id="pendingList" class="articles-list"></div>
                </div>

                <!-- Approved News Tab -->
                <div id="approved" class="tab-content">
                    <h3>Published Articles</h3>
                    <div id="approvedList" class="articles-list"></div>
                </div>

                <!-- Rejected News Tab -->
                <div id="rejected" class="tab-content">
                    <h3>Rejected Articles</h3>
                    <div id="rejectedList" class="articles-list"></div>
                </div>

                <!-- Categories Tab -->
                <div id="categories" class="tab-content">
                    <h3>Manage Categories</h3>
                    <div class="categories-grid" id="categoriesList"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Article Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h3>Edit Article</h3>
            <form id="editForm">
                <input type="hidden" id="editArticleId">
                <div class="form-group">
                    <label for="editTitle">Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label for="editCategory">Category</label>
                    <select id="editCategory" required>
                        <option value="darjeeling">Darjeeling</option>
                        <option value="kalimpong">Kalimpong</option>
                        <option value="kurseong">Kurseong</option>
                        <option value="mirik">Mirik</option>
                        <option value="siliguri">Siliguri</option>
                        <option value="west-bengal">West Bengal</option>
                        <option value="national">National</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="sports">Sports</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editContent">Content</label>
                    <textarea id="editContent" required rows="8"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@latest/dist/appwrite.umd.js"></script>
    <script src="js/config.js"></script>
    <script src="js/appwrite.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
