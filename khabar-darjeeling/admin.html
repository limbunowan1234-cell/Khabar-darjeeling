<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Dashboard - Khabar Darjeeling</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <h1>खबर दार्जिलिंग</h1>
            <h2>Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="loginError" class="error-text" style="display:none;"></p>
            </form>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel" style="display:none;">
        <nav class="admin-navbar">
            <div class="admin-navbar-content">
                <h2>Admin Panel</h2>
                <div class="admin-nav-right">
                    <span id="adminUser"></span>
                    <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                </div>
            </div>
        </nav>

        <div class="admin-container">
            <aside class="admin-sidebar">
                <ul class="admin-menu">
                    <li><a href="#" onclick="showTab('dashboard')" class="menu-item active">📊 Dashboard</a></li>
                    <li><a href="#" onclick="showTab('pending')" class="menu-item">⏳ Pending News</a></li>
                    <li><a href="#" onclick="showTab('published')" class="menu-item">✓ Published</a></li>
                    <li><a href="#" onclick="showTab('rejected')" class="menu-item">✗ Rejected</a></li>
                    <li><a href="#" onclick="showTab('categories')" class="menu-item">📁 Categories</a></li>
                </ul>
            </aside>

            <main class="admin-main">
                <div id="dashboard" class="tab-content active">
                    <h3>Dashboard</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h4>Total Articles</h4>
                            <p id="totalArticles">0</p>
                        </div>
                        <div class="stat-card">
                            <h4>Pending Review</h4>
                            <p id="pendingCount">0</p>
                        </div>
                        <div class="stat-card">
                            <h4>Published</h4>
                            <p id="publishedCount">0</p>
                        </div>
                        <div class="stat-card">
                            <h4>Rejected</h4>
                            <p id="rejectedCount">0</p>
                        </div>
                    </div>
                </div>

                <div id="pending" class="tab-content">
                    <h3>Pending Articles</h3>
                    <div id="pendingList" class="articles-list"></div>
                </div>

                <div id="published" class="tab-content">
                    <h3>Published Articles</h3>
                    <div id="publishedList" class="articles-list"></div>
                </div>

                <div id="rejected" class="tab-content">
                    <h3>Rejected Articles</h3>
                    <div id="rejectedList" class="articles-list"></div>
                </div>

                <div id="categories" class="tab-content">
                    <h3>Categories</h3>
                    <div id="categoriesList"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Edit Article</h3>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="editContent" rows="10" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Update</button>
            </form>
        </div>
    </div>

    <!-- Appwrite SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@15.0.0"></script>
    
    <!-- Config and Appwrite initialization -->
    <script src="js/config.js"></script>
    <script src="js/appwrite.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
