<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Dashboard - Khabar Darjeeling</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <h1>खबर दार्जिलिंग</h1>
            <h2>Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="loginError" class="error-text" style="display:none;"></p>
            </form>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel" style="display:none;">
        <!-- Admin Navbar -->
        <nav class="admin-navbar">
            <div class="admin-navbar-content">
                <h2>Admin Panel</h2>
                <div class="admin-nav-right">
                    <span id="adminUser"></span>
                    <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                </div>
            </div>
        </nav>

        <div class="admin-container">
            <!-- Sidebar -->
            <aside class="admin-sidebar">
                <ul class="admin-menu">
                    <li><a href
