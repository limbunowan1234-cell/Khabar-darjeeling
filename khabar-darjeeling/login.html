<!DOCTYPE html><html lang="ne"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title>
<style>*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}body{background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.card{background:#fff;padding:32px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);width:100%;max-width:380px}h1{color:#c41e3a;margin-bottom:8px}input{width:100%;padding:14px;border:2px solid #ddd;border-radius:8px;margin-bottom:14px;font-size:15px}button{width:100%;padding:14px;background:#c41e3a;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer}.error{color:#d32f2f;background:#ffebee;padding:12px;border-radius:8px;margin-bottom:14px;display:none}</style>
</head><body>
<div class="card"><h1>🔐 Login</h1><div id="error" class="error"></div>
<input id="email" type="email" placeholder="Email" value="nowanad@gmail.com">
<input id="password" type="password" placeholder="Password">
<button id="btn" onclick="login()">Login</button></div>
<script>
async function login(){
 const e=document.getElementById('email').value, p=document.getElementById('password').value, btn=document.getElementById('btn'), err=document.getElementById('error');
 btn.disabled=true; btn.textContent='Logging in...'; err.style.display='none';
 try{
  // 1. Create session (sets cookie, but we won't rely on it)
  let r=await fetch('https://nyc.cloud.appwrite.io/v1/account/sessions/email',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json','X-Appwrite-Project':'khabardarjeeling'},body:JSON.stringify({email:e,password:p})});
  if(!r.ok) throw new Error('Wrong email/password');
  
  // 2. Create JWT token (works without cookies)
  r=await fetch('https://nyc.cloud.appwrite.io/v1/account/jwts',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json','X-Appwrite-Project':'khabardarjeeling'},body:JSON.stringify({})});
  const jwt=await r.json();
  
  // 3. Save token locally
  localStorage.setItem('kd_jwt', jwt.jwt);
  localStorage.setItem('kd_email', e);
  
  location.href='/';
 }catch(ex){err.textContent=ex.message;err.style.display='block';btn.disabled=false;btn.textContent='Login';}
}
</script></body></html>
