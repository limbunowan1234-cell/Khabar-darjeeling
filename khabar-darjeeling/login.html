<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portal Access • खबर दार्जिलिंग</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css?v=1">
</head>
<body>
  <div class="gatekeeper-loader" id="gatekeeperLoader">
    <img src="assets/logo.png" alt="Khabar Darjeeling" class="loader-logo">
    <div class="loader-spinner"></div>
    <p class="loader-text">Checking authentication...</p>
  </div>

  <button class="dark-mode-toggle" id="darkModeToggle" type="button" aria-label="Toggle dark mode">
    <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg>
    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
  </button>

  <div class="login-wrapper">
    <div class="brand-header">
      <img src="assets/logo.png" alt="Logo" class="brand-logo">
      <h1>खबर दार्जिलिंग</h1>
      <p>Hamro Khabar, Hami Lekhaw</p>
    </div>

    <div class="card">
      <form id="loginForm">
        <div class="form-control"><input type="email" id="loginEmail" placeholder="Email address" required autocomplete="email"></div>
        <div class="form-control">
          <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
          <button type="button" class="password-toggle" id="loginPasswordToggle">👁</button>
        </div>
        <button type="submit" id="loginBtn" class="btn-submit">Log In</button>
        <a href="#" class="forgot-link" id="forgotLink">Forgot Password?</a>
        <div class="toggle-box">Don't have an account? <span class="toggle-link" id="signupLink">Sign Up</span></div>
      </form>

      <form id="signupForm" class="hidden">
        <p class="instruction-text">Create your account</p>
        <div class="form-control"><input type="text" id="signupName" placeholder="Full name" required></div>
        <div class="form-control"><input type="email" id="signupEmail" placeholder="Email address" required></div>
        <div class="form-control"><input type="password" id="signupPassword" placeholder="Create password (min 8 chars)" minlength="8" required><button type="button" class="password-toggle" id="signupPasswordToggle">👁</button></div>
        <div class="form-control"><input type="password" id="signupPasswordConfirm" placeholder="Confirm password" minlength="8" required><button type="button" class="password-toggle" id="signupPasswordConfirmToggle">👁</button></div>
        <button type="submit" id="signupBtn" class="btn-submit">Create Account</button>
        <div class="toggle-box">Already have an account? <span class="toggle-link" id="loginLinkFromSignup">Log In</span></div>
      </form>

      <form id="forgotForm" class="hidden">
        <p class="instruction-text">Enter your email for reset link</p>
        <div class="form-control"><input type="email" id="forgotEmail" placeholder="Account email" required></div>
        <button type="submit" id="forgotBtn" class="btn-submit">Send Reset Link</button>
        <div class="toggle-box">Remembered? <span class="toggle-link" id="backToLoginFromForgot">Back to Log In</span></div>
      </form>

      <p id="feedback" class="status-feedback"></p>
    </div>
  </div>

  <script src="js/login.js?v=1"></script>
</body>
</html>
