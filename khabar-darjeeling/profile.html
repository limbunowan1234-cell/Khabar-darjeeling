<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#b81d24">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="manifest" href="manifest.json">
  <title>My Profile - खबर दार्जिलिंग</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=117" />
  <style>
    :root {
      --primary: #c41e3a;
      --bg: #f6f6f6;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #e7e7e7;
    }
    body.dark-mode {
      --bg: #121212;
      --card: #1d1d1d;
      --text: #f4f4f4;
      --muted: #b4b4b4;
      --border: #2c2c2c;
      background: var(--bg);
      color: var(--text);
    }
    body {
      margin: 0;
      font-family: 'Poppins', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      font-weight: 700;
      color: var(--primary);
      font-size: 20px;
    }
    .btn {
      border: none;
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
      font-family: inherit;
    }
    .btn.secondary {
      background: #666;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
      margin-top: 18px;
    }
    .cover {
      height: 180px;
      background: linear-gradient(135deg, #c41e3a, #8b1025);
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 5px solid var(--card);
      background: #ddd;
      background-size: cover;
      background-position: center;
      position: absolute;
      left: 24px;
      bottom: -60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      color: #fff;
      background-color: var(--primary);
    }
    .content {
      padding: 76px 24px 24px;
    }
    .name {
      font-size: 30px;
      font-weight: 800;
      margin: 0 0 6px;
    }
    .username {
      color: var(--muted);
      margin: 0 0 12px;
      font-size: 16px;
    }
    .joined {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 18px;
    }
    .bio {
      line-height: 1.6;
      font-size: 16px;
      white-space: pre-wrap;
      margin-bottom: 20px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .stat-box {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(196, 30, 58, 0.04);
      text-align: center;
    }
    body.dark-mode .stat-box {
      background: rgba(255, 255, 255, 0.03);
    }
    .stat-number {
      font-size: 26px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin: 30px 0 15px;
    }
    .article-item {
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.01);
    }
    body.dark-mode .article-item {
      background: rgba(255,255,255,0.02);
    }
    .article-info a {
      text-decoration: none;
      color: var(--primary);
      font-weight: 600;
      font-size: 16px;
    }
    .article-info a:hover {
      text-decoration: underline;
    }
    .article-stats {
      font-size: 13px;
      color: var(--muted);
      margin-top: 5px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .share-buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .share-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
    }
    .share-btn:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    .box {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(0,0,0,0.02);
    }
    body.dark-mode .box {
      background: rgba(255,255,255,0.03);
    }
    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .value {
      font-size: 15px;
      word-break: break-word;
    }
    .alert {
      padding: 14px 16px;
      border-radius: 10px;
      margin-top: 18px;
      display: none;
    }
    .alert.error {
      background: #ffe1e5;
      color: #8b1025;
      border: 1px solid #ffb9c5;
    }
    .alert.info {
      background: #e7f3ff;
      color: #0b4f8a;
      border: 1px solid #b8dcff;
    }
    body.dark-mode .alert.error {
      background: #3a151c;
      color: #ffb9c5;
      border-color: #5a1d29;
    }
    body.dark-mode .alert.info {
      background: #132739;
      color: #b8dcff;
      border-color: #224966;
    }
    .loader {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 640px) {
      .meta { grid-template-columns: 1fr; }
      .avatar { width: 96px; height: 96px; bottom: -48px; }
      .content { padding-top: 62px; }
      .name { font-size: 24px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">खबर दार्जिलिंग</div>
    <div>
      <a class="btn secondary" href="index.html">Home</a>
      <a class="btn" href="post.html">Create Post</a>
    </div>
  </div>

  <div class="wrap">
    <div id="alertBox" class="alert"></div>

    <div class="card">
      <div id="cover" class="cover">
        <div id="avatar" class="avatar">?</div>
      </div>

      <div class="content">
        <div id="loader" class="loader">Loading profile...</div>

        <div id="profileBody" style="display:none;">
          <h1 id="displayName" class="name">Name</h1>
          <p id="userName" class="username">@username</p>
          <p id="joinedAT" class="joined">Joined date</p>

          <div id="bio" class="bio"></div>

          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-number" id="totalPosts">0</div>
              <div class="stat-label">Total Posts</div>
            </div>
            <div class="stat-box">
              <div class="stat-number" id="totalViews">0</div>
              <div class="stat-label">Total Views</div>
            </div>
            <div class="stat-box">
              <div class="stat-number" id="totalLikes">0</div>
              <div class="stat-label">Total Likes</div>
            </div>
            <div class="stat-box">
              <div class="stat-number" id="totalComments">0</div>
              <div class="stat-label">Comments Made</div>
            </div>
          </div>

          <h3 class="section-title">Your Articles</h3>
          <div id="userArticles">
            <div class="loader">Loading articles...</div>
          </div>

          <div class="meta" style="margin-top:30px;">
            <div class="box">
              <div class="label">User ID</div>
              <div id="userId" class="value"></div>
            </div>
            <div class="box">
              <div class="label">Profile Document</div>
              <div id="docId" class="value"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.min.js"></script>
  <script src="js/appwrite.js?v=117"></script>
  <script>
    (() => {
      if (!window.Appwrite) {
        document.getElementById('alertBox').textContent = 'Appwrite failed to load.';
        document.getElementById('alertBox').className = 'alert error';
        document.getElementById('alertBox').style.display = 'block';
        return;
      }

      const { Client, Account, Databases, Query } = window.Appwrite;
      const client = new Client()
        .setEndpoint(window.APPWRITE_ENDPOINT)
        .setProject(window.APPWRITE_PROJECT_ID);

      const account = new Account(client);
      const databases = new Databases(client);

      const DB_ID = window.APPWRITE_DB_ID;
      const PROFILES_COLLECTION = 'profiles';
      const ARTICLES_COLLECTION = 'articles';
      const LIKES_COLLECTION = 'likes';
      const COMMENTS_COLLECTION = 'comments';

      const els = {
        alertBox: document.getElementById('alertBox'),
        loader: document.getElementById('loader'),
        profileBody: document.getElementById('profileBody'),
        displayName: document.getElementById('displayName'),
        userName: document.getElementById('userName'),
        joinedAT: document.getElementById('joinedAT'),
        bio: document.getElementById('bio'),
        userId: document.getElementById('userId'),
        docId: document.getElementById('docId'),
        avatar: document.getElementById('avatar'),
        cover: document.getElementById('cover'),
        totalPosts: document.getElementById('totalPosts'),
        totalViews: document.getElementById('totalViews'),
        totalLikes: document.getElementById('totalLikes'),
        totalComments: document.getElementById('totalComments'),
        userArticles: document.getElementById('userArticles')
      };

      function showAlert(message, type = 'info') {
        els.alertBox.textContent = message;
        els.alertBox.className = `alert ${type}`;
        els.alertBox.style.display = 'block';
      }

      function initials(name) {
        return (name || '?').split(' ').filter(Boolean).map(x => x[0]).join('').toUpperCase().slice(0, 2) || '?';
      }

      function safeText(v) {
        return v && String(v).trim() ? String(v) : '—';
      }

      function formatDate(v) {
        if (!v) return '—';
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return String(v);
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      }

      function shareArticle(articleId, title, platform) {
        const url = `${window.location.origin}/article.html?id=${articleId}`;
        const text = `Check out: ${title}`;

        if (platform === 'whatsapp') {
          window.open(`https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`, '_blank');
        } else if (platform === 'facebook') {
          window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
        } else if (platform === 'twitter') {
          window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        } else if (platform === 'native' && navigator.share) {
          navigator.share({ title, text, url }).catch(() => {});
        } else {
          navigator.clipboard.writeText(url);
          alert('Link copied to clipboard!');
        }
      }

      async function loadProfile() {
        await new Promise(r => setTimeout(r, 150));

        try {
          const user = await account.get();
          const result = await databases.listDocuments(DB_ID, PROFILES_COLLECTION, [
            Query.equal('userId', user.$id),
            Query.limit(1)
          ]);

          if (!result.documents.length) {
            els.loader.style.display = 'none';
            showAlert('No profile found for this account yet. Open post.html once to auto-create it.', 'info');
            return;
          }

          const profile = result.documents[0];

          els.displayName.textContent = safeText(profile.displayName);
          els.userName.textContent = '@' + safeText(profile.userName);
          els.joinedAT.textContent = 'Joined ' + formatDate(profile.joinedAT);
          els.bio.textContent = safeText(profile.bio);
          els.userId.textContent = safeText(profile.userId);
          els.docId.textContent = safeText(profile.$id);

          const nameForInitials = profile.displayName || user.name || 'User';
          els.avatar.textContent = initials(nameForInitials);

          if (profile.avatarUrl) {
            els.avatar.style.backgroundImage = `url('${profile.avatarUrl}')`;
            els.avatar.textContent = '';
          }

          if (profile.coverUrl) {
            els.cover.style.backgroundImage = `url('${profile.coverUrl}')`;
          }

          const articles = await databases.listDocuments(DB_ID, ARTICLES_COLLECTION, [
            Query.equal('submitterId', user.$id),
            Query.equal('status', 'published'),
            Query.orderDesc('$createdAt'),
            Query.limit(100)
          ]);

          let totalViews = 0;
          articles.documents.forEach(a => totalViews += (a.views || 0));

          els.totalPosts.textContent = articles.total;
          els.totalViews.textContent = totalViews;

          let totalLikes = 0;
          for (const article of articles.documents) {
            try {
              const likes = await databases.listDocuments(DB_ID, LIKES_COLLECTION, [
                Query.equal('articleId', article.$id),
                Query.limit(1)
              ]);
              totalLikes += likes.total;
            } catch (e) {}
          }
          els.totalLikes.textContent = totalLikes;

          const userComments = await databases.listDocuments(DB_ID, COMMENTS_COLLECTION, [
            Query.equal('userId', user.$id),
            Query.limit(1)
          ]);
          els.totalComments.textContent = userComments.total;

          if (articles.documents.length === 0) {
            els.userArticles.innerHTML = '<p style="color:var(--muted);padding:20px;text-align:center;">No articles published yet.</p>';
          } else {
            els.userArticles.innerHTML = articles.documents.map(a => `
              <div class="article-item">
                <div class="article-info">
                  <a href="article.html?id=${a.$id}">${a.title}</a>
                  <div class="article-stats">
                    ${formatDate(a.$createdAt)} • ${a.views || 0} views • ${a.category || 'General'}
                  </div>
                  <div class="share-buttons">
                    <button class="share-btn" onclick="shareArticle('${a.$id}', '${a.title.replace(/'/g, "\\'")}', 'whatsapp')">📱 WhatsApp</button>
                    <button class="share-btn" onclick="shareArticle('${a.$id}', '${a.title.replace(/'/g, "\\'")}', 'facebook')">📘 Facebook</button>
                    <button class="share-btn" onclick="shareArticle('${a.$id}', '${a.title.replace(/'/g, "\\'")}', 'twitter')">🐦 Twitter</button>
                    <button class="share-btn" onclick="shareArticle('${a.$id}', '${a.title.replace(/'/g, "\\'")}', 'native')">🔗 Share</button>
                  </div>
                </div>
              </div>
            `).join('');
          }

          els.loader.style.display = 'none';
          els.profileBody.style.display = 'block';
        } catch (error) {
          els.loader.style.display = 'none';
          showAlert(error?.message || 'Failed to load profile. Please log in again.', 'error');
          setTimeout(() => window.location.href = 'login.html', 2000);
        }
      }

      window.shareArticle = shareArticle;

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadProfile);
      } else {
        loadProfile();
      }
    })();
  </script>
</body>
</html>
