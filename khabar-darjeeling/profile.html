<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contributor Profile - Khabar Darjeeling">
    <meta name="theme-color" content="#c41e3a">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <title>Profile - खबर दार्जिलिंग</title>

    <link rel="stylesheet" href="css/style.css?v=117">
    <link rel="stylesheet" href="css/responsive.css?v=117">

    <style>
        body { background: #f5f5f5; }

        .profile-shell { max-width: 1100px; margin: 0 auto; padding: 30px 15px 60px; }

        .profile-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.08); margin-bottom: 30px; }
        body.dark-mode .profile-card { background: #222; color: #eee; }

        .profile-cover { height: 220px; background: linear-gradient(135deg, #c41e3a, #900); position: relative; }
        .profile-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .profile-header { padding: 0 24px 24px; margin-top: -54px; position: relative; }

        .profile-avatar { width: 108px; height: 108px; border-radius: 50%; border: 5px solid #fff; background: #c41e3a; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 800; overflow: hidden; }
        body.dark-mode .profile-avatar { border-color: #222; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .profile-meta { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
        .profile-meta h1 { font-size: 30px; line-height: 1.2; color: #1a1a1a; }
        body.dark-mode .profile-meta h1 { color: #fff; }

        .profile-bio { color: #666; font-size: 15px; line-height: 1.7; max-width: 760px; }
        body.dark-mode .profile-bio { color: #bbb; }

        .profile-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 18px; }
        .stat-box { background: #f8f8f8; border-radius: 12px; padding: 16px; text-align: center; }
        body.dark-mode .stat-box { background: #2b2b2b; }
        .stat-box .label { display: block; font-size: 12px; color: #777; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
        .stat-box .value { font-size: 24px; font-weight: 800; color: #c41e3a; }

        .section-title { margin: 0 0 16px; font-size: 22px; color: #1a1a1a; }
        body.dark-mode .section-title { color: #fff; }

        .news-list { display: grid; gap: 18px; }

        .news-item { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.06); display: grid; grid-template-columns: 180px 1fr; min-height: 170px; }
        body.dark-mode .news-item { background: #222; }

        .news-thumb { width: 100%; height: 100%; min-height: 170px; object-fit: cover; background: #eee; }

        .news-body { padding: 18px; display: flex; flex-direction: column; justify-content: space-between; gap: 12px; }
        .news-body h3 { font-size: 20px; line-height: 1.3; color: #1a1a1a; }
        body.dark-mode .news-body h3 { color: #fff; }
        .news-body p { color: #666; line-height: 1.6; font-size: 14px; margin: 0; }
        body.dark-mode .news-body p { color: #bbb; }

        .news-meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; font-size: 13px; color: #777; margin-bottom: 8px; }

        .news-link { color: #c41e3a; font-weight: 700; text-decoration: none; }
        .news-link:hover { text-decoration: underline; }

        .profile-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
        .btn-profile { display: inline-block; padding: 10px 16px; border-radius: 8px; text-decoration: none; font-weight: 700; border: none; cursor: pointer; }
        .btn-primary { background: #c41e3a; color: #fff; }
        .btn-secondary { background: #eee; color: #222; }
        body.dark-mode .btn-secondary { background: #333; color: #fff; }

        .empty-state, .error-state, .loading-state { background: #fff; border-radius: 14px; padding: 24px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        body.dark-mode .empty-state, body.dark-mode .error-state, body.dark-mode .loading-state { background: #222; color: #eee; }

        @media (max-width: 768px) {
            .profile-cover { height: 170px; }
            .profile-avatar { width: 88px; height: 88px; font-size: 28px; }
            .profile-meta h1 { font-size: 24px; }
            .news-item { grid-template-columns: 1fr; }
            .news-thumb { min-height: 210px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <div class="logo">
                    <a href="index.html" style="display:flex;align-items:center;text-decoration:none;gap:12px;">
                        <img src="assets/logo.png" alt="Khabar Darjeeling Logo" style="height:55px;width:55px;object-fit:cover;border-radius:50%;flex-shrink:0;">
                        <div>
                            <h1 style="font-size:24px;color:var(--primary-color);margin:0;line-height:1.2;">खबर दार्जिलिंग</h1>
                            <p class="tagline" style="margin:0;font-size:11px;color:var(--text-light);font-weight:500;">Hamro Khabar, Hami Lekhaw</p>
                        </div>
                    </a>
                </div>
                <div class="nav-right">
                    <a href="index.html" class="admin-link" style="text-decoration:none;">Home</a>
                    <a href="submit.html" class="admin-link" style="text-decoration:none;margin-left:12px;">Submit News</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="profile-shell">
        <div id="profileRoot">
            <div class="loading-state">Loading profile...</div>
        </div>

        <section style="margin-top:30px;">
            <h2 class="section-title">Published News</h2>
            <div id="userNewsList" class="news-list">
                <div class="loading-state">Loading news...</div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.min.js"></script>
    <script src="js/appwrite.js?v=117"></script>

    <script>
        (() => {
            if (!window.databases || !window.Query || !window.storage) {
                document.getElementById('profileRoot').innerHTML =
                    '<div class="error-state">Appwrite not initialized properly. Make sure storage is exported in appwrite.js</div>';
                return;
            }

            const db = window.databases;
            const QueryAPI = window.Query;
            const storage = window.storage;
            const DB_ID = window.APPWRITE_DB_ID;
            const BUCKET_ID = window.APPWRITE_BUCKET_ID;
            const PROFILES_COLLECTION = 'profiles';
            const ARTICLES_COLLECTION = window.APPWRITE_COLLECTION_ID;

            const params = new URLSearchParams(window.location.search);
            const userId = params.get('userId');

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text || '';
                return div.innerHTML;
            }

            function truncateText(htmlStr, maxLength) {
                const div = document.createElement('div');
                div.innerHTML = htmlStr || '';
                const text = div.textContent || div.innerText || '';
                return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
            }

            function formatDate(dateString) {
                try {
                    return new Date(dateString).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                } catch {
                    return 'Date unknown';
                }
            }

            function getInitials(name) {
                if (!name) return 'KD';
                const parts = name.trim().split(' ');
                if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
                return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
            }

            async function loadProfile() {
                if (!userId) {
                    document.getElementById('profileRoot').innerHTML =
                        '<div class="error-state">No profile selected. Ensure the URL has ?userId=...</div>';
                    document.getElementById('userNewsList').innerHTML = '';
                    return;
                }

                try {
                    const profileRes = await db.listDocuments(DB_ID, PROFILES_COLLECTION, [
                        QueryAPI.equal('userId', userId),
                        QueryAPI.limit(1)
                    ]);

                    if (!profileRes.documents.length) {
                        document.getElementById('profileRoot').innerHTML =
                            '<div class="empty-state">Profile not found.</div>';
                        document.getElementById('userNewsList').innerHTML = '';
                        return;
                    }

                    const profile = profileRes.documents[0];
                    renderProfile(profile);
                    await loadUserNews(userId, profile.displayName || profile.userName || 'Reporter');
                } catch (error) {
                    console.error("Profile load error:", error);
                    document.getElementById('profileRoot').innerHTML =
                        '<div class="error-state">Failed to load profile.</div>';
                    document.getElementById('userNewsList').innerHTML = '';
                }
            }

            function renderProfile(profile) {
                const displayName = profile.displayName || profile.userName || 'Reporter';
                const bio = profile.bio || 'No bio yet.';
                const avatarUrl = profile.avatarUrl;
                const coverUrl = profile.coverUrl;
                const joinedAt = profile.joinedAT || profile.joinedAt || profile.$createdAt;

                const profileHtml = `
                    <div class="profile-card">
                        <div class="profile-cover">
                            ${coverUrl ? `<img src="${coverUrl}" alt="${escapeHtml(displayName)} cover">` : ''}
                        </div>
                        <div class="profile-header">
                            <div class="profile-avatar">
                                ${avatarUrl ? `<img src="${avatarUrl}" alt="${escapeHtml(displayName)}">` : getInitials(displayName)}
                            </div>
                            <div class="profile-meta">
                                <h1>${escapeHtml(displayName)}</h1>
                                <div style="color:#888;font-size:13px;">@${escapeHtml(profile.userName || 'reporter')}</div>
                                <div class="profile-bio">${escapeHtml(bio)}</div>

                                <div class="profile-actions">
                                    <a href="submit.html" class="btn-profile btn-primary">Submit News</a>
                                    <a href="index.html" class="btn-profile btn-secondary">Back to Home</a>
                                </div>

                                <div class="profile-stats">
                                    <div class="stat-box">
                                        <span class="label">Profile ID</span>
                                        <span class="value" style="font-size:14px;">${escapeHtml(profile.userId || '')}</span>
                                    </div>
                                    <div class="stat-box">
                                        <span class="label">Joined</span>
                                        <span class="value" style="font-size:14px;">${formatDate(joinedAt)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('profileRoot').innerHTML = profileHtml;
                document.title = `${displayName} - खबर दार्जिलिंग`;
            }

            async function loadUserNews(targetUserId, displayName) {
                const newsList = document.getElementById('userNewsList');
                newsList.innerHTML = '<div class="loading-state">Loading news...</div>';

                try {
                    const res = await db.listDocuments(DB_ID, ARTICLES_COLLECTION, [
                        QueryAPI.equal('submitterId', targetUserId),
                        QueryAPI.equal('status', 'published'),
                        QueryAPI.orderDesc('$createdAt'),
                        QueryAPI.limit(20)
                    ]);

                    if (!res.documents.length) {
                        newsList.innerHTML = `<div class="empty-state">${escapeHtml(displayName)} has not published any news yet.</div>`;
                        return;
                    }

                    let html = '';
                    for (const article of res.documents) {
                        let finalImageUrl = 'assets/logo.png'; // Fallback if no image exists
                        const imgId = article.imageUrl || article.imageFileId;

                        if (imgId) {
                            if (imgId.startsWith('http')) {
                                finalImageUrl = imgId;
                            } else {
                                // Safely fetch the image preview using the Appwrite SDK
                                const preview = storage.getFilePreview(BUCKET_ID, imgId);
                                finalImageUrl = preview.href;
                            }
                        }

                        html += `
                            <article class="news-item">
                                <img class="news-thumb" src="${finalImageUrl}" alt="${escapeHtml(article.title)}" loading="lazy">
                                <div class="news-body">
                                    <div>
                                        <h3>${escapeHtml(article.title || 'Untitled')}</h3>
                                        <div class="news-meta">
                                            <span style="background:#f8e8ea; color:#c41e3a; padding:3px 8px; border-radius:4px; font-weight:600; text-transform:uppercase; font-size:11px;">
                                                ${escapeHtml(article.category || 'General')}
                                            </span>
                                            <span>${formatDate(article.$createdAt)}</span>
                                        </div>
                                        <p>${escapeHtml(truncateText(article.content, 180))}</p>
                                    </div>
                                    <div>
                                        <a class="news-link" href="article.html?id=${article.$id}">Read full story →</a>
                                    </div>
                                </div>
                            </article>
                        `;
                    }
                    newsList.innerHTML = html;

                } catch (error) {
                    console.error("News load error:", error);
                    newsList.innerHTML = '<div class="error-state">Failed to load news.</div>';
                }
            }

            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }

            loadProfile();
        })();
    </script>
</body>
</html>
