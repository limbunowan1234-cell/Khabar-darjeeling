<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#b81d24">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="manifest" href="manifest.json">
  <title>My Profile - खबर दार्जिलिंग</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=121" />
  <style>
    :root {
      --primary: #c41e3a;
      --bg: #f6f6f6;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #e7e7e7;
    }
    body.dark-mode {
      --bg: #121212;
      --card: #1d1d1d;
      --text: #f4f4f4;
      --muted: #b4b4b4;
      --border: #2c2c2c;
      background: var(--bg);
      color: var(--text);
    }
    body {
      margin: 0;
      font-family: 'Poppins', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
 .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }
 .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
 .brand {
      font-weight: 700;
      color: var(--primary);
      font-size: 20px;
    }
 .topbar-actions {
      display: flex;
      gap: 8px;
    }
 .btn {
      border: none;
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
      font-family: inherit;
    }
 .btn.secondary {
      background: #666;
    }
 .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
 .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.05);
      margin-top: 18px;
    }
 .cover {
      height: 180px;
      background: linear-gradient(135deg, #c41e3a, #8b1025);
      background-size: cover;
      background-position: center;
      position: relative;
    }
 .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 5px solid var(--card);
      background: #ddd;
      background-size: cover;
      background-position: center;
      position: absolute;
      left: 24px;
      bottom: -60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      color: #fff;
      background-color: var(--primary);
    }
 .edit-profile-btn {
      position: absolute;
      right: 16px;
      top: 16px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }
 .content {
      padding: 76px 24px;
    }
 .name {
      font-size: 30px;
      font-weight: 800;
      margin: 0 0 6px;
    }
 .username {
      color: var(--muted);
      margin: 0 0 12px;
      font-size: 16px;
    }
 .joined {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 18px;
    }
 .bio {
      line-height: 1.6;
      font-size: 16px;
      white-space: pre-wrap;
      margin-bottom: 20px;
    }
 .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
 .stat-box {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(196, 30, 58, 0.04);
      text-align: center;
    }
 .stat-number {
      font-size: 26px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 4px;
    }
 .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing:.04em;
    }
 .section-title {
      font-size: 20px;
      font-weight: 700;
      margin: 30px 0 15px;
    }
 .article-item {
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.01);
    }
 .article-info a {
      text-decoration: none;
      color: var(--primary);
      font-weight: 600;
      font-size: 16px;
    }
 .article-stats {
      font-size: 13px;
      color: var(--muted);
      margin-top: 5px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
 .share-buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
 .share-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
    }
 .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
 .box {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(0,0,0,0.02);
    }
 .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing:.04em;
    }
 .value {
      font-size: 15px;
      word-break: break-word;
    }
 .alert {
      padding: 14px 16px;
      border-radius: 10px;
      margin-top: 18px;
      display: none;
    }
 .alert.error {
      background: #ffe1e5;
      color: #8b1025;
      border: 1px solid #ffb9c5;
    }
 .alert.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
 .loader {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }
 .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }
 .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
 .modal-content {
      background: var(--card);
      padding: 24px;
      border-radius: 16px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
 .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
 .modal-title {
      font-size: 22px;
      font-weight: 700;
    }
 .close-btn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
    }
 .form-group {
      margin-bottom: 16px;
    }
 .form-label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }
 .form-input,.form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
    }
 .form-textarea {
      resize: vertical;
      min-height: 80px;
    }
 .file-input-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }
 .file-input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
 .file-input-label {
      display: block;
      padding: 10px 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
    }
 .preview-img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 8px;
      display: none;
    }
 .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    @media (max-width: 640px) {
  .meta { grid-template-columns: 1fr; }
  .avatar { width: 96px; height: 96px; bottom: -48px; }
  .content { padding-top: 62px; }
  .name { font-size: 24px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">खबर दार्जिलिंग</div>
    <div class="topbar-actions">
      <a class="btn secondary" href="index.html">Home</a>
      <a class="btn" href="post.html">Create Post</a>
      <button class="btn secondary" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="wrap">
    <div id="alertBox" class="alert"></div>

    <div class="card">
      <div id="cover" class="cover">
        <button class="edit-profile-btn" id="editProfileBtn">✏️ Edit Profile</button>
        <div id="avatar" class="avatar">?</div>
      </div>

      <div class="content">
        <div id="loader" class="loader">Loading profile...</div>

        <div id="profileBody" style="display:none;">
          <h1 id="displayName" class="name">Name</h1>
          <p id="userName" class="username">@username</p>
          <p id="joinedAT" class="joined">Joined date</p>

          <div id="bio" class="bio"></div>

          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-number" id="totalPosts">0</div>
              <div class="stat-label">Total Posts</div>
            </div>
            <div class="stat-box">
              <div class="stat-number" id="totalViews">0</div>
              <div class="stat-label">Total Views</div>
            </div>
            <div class="stat-box">
              <div class="stat-number" id="totalLikes">0</div>
              <div class="stat-label">Total Likes</div>
            </div>
            <div class="stat-box">
              <div class="stat-number" id="totalComments">0</div>
              <div class="stat-label">Comments Made</div>
            </div>
          </div>

          <h3 class="section-title">Your Articles</h3>
          <div id="userArticles">
            <div class="loader">Loading articles...</div>
          </div>

          <div class="meta" style="margin-top:30px;">
            <div class="box">
              <div class="label">User ID</div>
              <div id="userId" class="value"></div>
            </div>
            <div class="box">
              <div class="label">Profile Document</div>
              <div id="docId" class="value"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Edit Profile</h2>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>
      <form id="editForm">
        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input type="text" class="form-input" id="editDisplayName" required>
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="editUserName" required>
        </div>
        <div class="form-group">
          <label class="form-label">Bio</label>
          <textarea class="form-textarea" id="editBio" placeholder="Tell us about yourself..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Avatar Image</label>
          <div class="file-input-wrapper">
            <input type="file" class="file-input" id="editAvatar" accept="image/*">
            <label for="editAvatar" class="file-input-label">📷 Choose Avatar Image</label>
          </div>
          <img id="avatarPreview" class="preview-img">
        </div>
        <div class="form-group">
          <label class="form-label">Cover Image</label>
          <div class="file-input-wrapper">
            <input type="file" class="file-input" id="editCover" accept="image/*">
            <label for="editCover" class="file-input-label">🖼️ Choose Cover Image</label>
          </div>
          <img id="coverPreview" class="preview-img">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn secondary" id="cancelEdit">Cancel</button>
          <button type="submit" class="btn" id="saveBtn">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.min.js"></script>
  <script src="js/appwrite.js?v=121"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      console.log('[Profile] DOM loaded');

      // Wait for appwrite.js to finish
      if (window.AppwriteReady) await window.AppwriteReady;

      if (!window.Appwrite ||!window.account ||!window.databases ||!window.storage) {
        document.getElementById('alertBox').textContent = 'Appwrite not initialized. Check js/appwrite.js';
        document.getElementById('alertBox').className = 'alert error';
        document.getElementById('alertBox').style.display = 'block';
        document.getElementById('loader').style.display = 'none';
        return;
      }

      const { account, databases, storage, ID, Query } = window;
      const DB_ID = window.APPWRITE_DB_ID;
      const ARTICLES_COLLECTION = window.APPWRITE_COLLECTION_ID;
      const PROFILES_COLLECTION = 'profiles';
      const LIKES_COLLECTION = 'likes';
      const COMMENTS_COLLECTION = 'comments';
      const BUCKET_ID = window.APPWRITE_BUCKET_ID;

      const els = {
        alertBox: document.getElementById('alertBox'),
        loader: document.getElementById('loader'),
        profileBody: document.getElementById('profileBody'),
        displayName: document.getElementById('displayName'),
        userName: document.getElementById('userName'),
        joinedAT: document.getElementById('joinedAT'),
        bio: document.getElementById('bio'),
        userId: document.getElementById('userId'),
        docId: document.getElementById('docId'),
        avatar: document.getElementById('avatar'),
        cover: document.getElementById('cover'),
        totalPosts: document.getElementById('totalPosts'),
        totalViews: document.getElementById('totalViews'),
        totalLikes: document.getElementById('totalLikes'),
        totalComments: document.getElementById('totalComments'),
        userArticles: document.getElementById('userArticles'),
        editModal: document.getElementById('editModal'),
        editForm: document.getElementById('editForm'),
        editDisplayName: document.getElementById('editDisplayName'),
        editUserName: document.getElementById('editUserName'),
        editBio: document.getElementById('editBio'),
        editAvatar: document.getElementById('editAvatar'),
        editCover: document.getElementById('editCover'),
        avatarPreview: document.getElementById('avatarPreview'),
        coverPreview: document.getElementById('coverPreview'),
        saveBtn: document.getElementById('saveBtn')
      };

      function showAlert(message, type = 'info') {
        console.log(`[Alert ${type}]:`, message);
        els.alertBox.textContent = message;
        els.alertBox.className = `alert ${type}`;
        els.alertBox.style.display = 'block';
        if (type!== 'error') {
          setTimeout(() => els.alertBox.style.display = 'none', 3000);
        }
      }

      let currentProfile = null;
      let currentUser = null;

      function initials(name) {
        return (name || '?').split(' ').filter(Boolean).map(x => x[0]).join('').toUpperCase().slice(0, 2) || '?';
      }

      function safeText(v) {
        return v && String(v).trim()? String(v) : '—';
      }

      function formatDate(v) {
        if (!v) return '—';
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return String(v);
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
      }

      function shareArticle(articleId, title, platform) {
        const url = `${window.location.origin}/article.html?id=${articleId}`;
        const text = `Check out: ${title}`;
        if (platform === 'whatsapp') {
          window.open(`https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`, '_blank');
        } else if (platform === 'facebook') {
          window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
        } else if (platform === 'twitter') {
          window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        } else if (platform === 'native' && navigator.share) {
          navigator.share({ title, text, url }).catch(() => {});
        } else {
          navigator.clipboard.writeText(url);
          showAlert('Link copied to clipboard!', 'success');
        }
      }

      async function loadProfile() {
        console.log('[Profile] loadProfile() start');
        try {
          currentUser = await account.get();
          console.log('[Profile] User:', currentUser.$id);

          const result = await databases.listDocuments(DB_ID, PROFILES_COLLECTION, [
            Query.equal('userId', currentUser.$id),
            Query.limit(1)
          ]);

          if (!result.documents.length) {
            els.loader.style.display = 'none';
            showAlert('No profile found. Open post.html once to auto-create it.', 'info');
            return;
          }

          currentProfile = result.documents[0];

          els.displayName.textContent = safeText(currentProfile.displayName);
          els.userName.textContent = '@' + safeText(currentProfile.userName);
          els.joinedAT.textContent = 'Joined ' + formatDate(currentProfile.joinedAT);
          els.bio.textContent = safeText(currentProfile.bio);
          els.userId.textContent = safeText(currentProfile.userId);
          els.docId.textContent = safeText(currentProfile.$id);

          const nameForInitials = currentProfile.displayName || currentUser.name || 'User';
          els.avatar.textContent = initials(nameForInitials);

          if (currentProfile.avatarUrl) {
            els.avatar.style.backgroundImage = `url('${currentProfile.avatarUrl}')`;
            els.avatar.textContent = '';
          }

          if (currentProfile.coverUrl) {
            els.cover.style.backgroundImage = `url('${currentProfile.coverUrl}')`;
          }

          const articles = await databases.listDocuments(DB_ID, ARTICLES_COLLECTION, [
            Query.equal('submitterId', currentUser.$id),
            Query.equal('status', 'published'),
            Query.orderDesc('$createdAt'),
            Query.limit(100)
          ]);

          let totalViews = 0;
          articles.documents.forEach(a => totalViews += (a.views || 0));
          els.totalPosts.textContent = articles.total;
          els.totalViews.textContent = totalViews;

          let totalLikes = 0;
          try {
            for (const article of articles.documents) {
              try {
                const likes = await databases.listDocuments(DB_ID, LIKES_COLLECTION, [
                  Query.equal('articleId', article.$id),
                  Query.limit(1)
                ]);
                totalLikes += likes.total;
              } catch (e) {
                console.warn('[Profile] Likes failed for', article.$id, e.message);
              }
            }
          } catch (e) {
            console.warn('[Profile] Likes collection error:', e.message);
          }
          els.totalLikes.textContent = totalLikes;

          try {
            const userComments = await databases.listDocuments(DB_ID, COMMENTS_COLLECTION, [
              Query.equal('userId', currentUser.$id),
              Query.limit(1)
            ]);
            els.totalComments.textContent = userComments.total;
          } catch (e) {
            console.warn('[Profile] Comments failed:', e.message);
            els.totalComments.textContent = '0';
          }

          if (articles.documents.length === 0) {
            els.userArticles.innerHTML = '<p style="color:var(--muted);padding:20px;text-align:center;">No articles published yet.</p>';
          } else {
            els.userArticles.innerHTML = articles.documents.map(a => `
              <div class="article-item">
                <div class="article-info">
                  <a href="article.html?id=${a.$id}">${a.title}</a>
                  <div class="article-stats">
                    ${formatDate(a.$createdAt)} • ${a.views || 0} views • ${a.category || 'General'}
                  </div>
                  <div class="share-buttons">
                    <button class="share-btn" onclick="shareArticle('${a.$id}', '${a.title.replace(/'/g, "\\'")}', 'whatsapp')">📱 WhatsApp</button>
                    <button class="share-btn" onclick="shareArticle('${a.$id}', '${a.title.replace(/'/g, "\\'")}', 'facebook')">📘 Facebook</button>
                    <button class="share-btn" onclick="shareArticle('${a.$id}', '${a.title.replace(/'/g, "\\'")}', 'twitter')">🐦 Twitter</button>
                    <button class="share-btn" onclick="shareArticle('${a.$id}', '${a.title.replace(/'/g, "\\'")}', 'native')">🔗 Share</button>
                  </div>
                </div>
              </div>
            `).join('');
          }

          els.loader.style.display = 'none';
          els.profileBody.style.display = 'block';
          console.log('[Profile] Render complete');

        } catch (error) {
          console.error('[Profile] Fatal error:', error);
          els.loader.style.display = 'none';
          showAlert(`Error: ${error?.message || 'Failed to load profile'}`, 'error');
        }
      }

      document.getElementById('editProfileBtn').addEventListener('click', () => {
        if (!currentProfile) {
          showAlert('Profile not loaded yet', 'error');
          return;
        }
        els.editDisplayName.value = currentProfile.displayName || '';
        els.editUserName.value = currentProfile.userName || '';
        els.editBio.value = currentProfile.bio || '';
        els.avatarPreview.style.display = 'none';
        els.coverPreview.style.display = 'none';
        els.editModal.classList.add('active');
      });

      document.getElementById('closeModal').addEventListener('click', () => {
        els.editModal.classList.remove('active');
      });

      document.getElementById('cancelEdit').addEventListener('click', () => {
        els.editModal.classList.remove('active');
      });

      els.editAvatar.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          els.avatarPreview.src = URL.createObjectURL(file);
          els.avatarPreview.style.display = 'block';
        }
      });

      els.editCover.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          els.coverPreview.src = URL.createObjectURL(file);
          els.coverPreview.style.display = 'block';
        }
      });

      els.editForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        console.log('[Profile] Save clicked');
        els.saveBtn.disabled = true;
        els.saveBtn.textContent = 'Saving...';

        try {
          let avatarUrl = currentProfile.avatarUrl;
          let coverUrl = currentProfile.coverUrl;

          if (els.editAvatar.files[0]) {
            console.log('[Profile] Uploading avatar...');
            const avatarFile = await storage.createFile(BUCKET_ID, ID.unique(), els.editAvatar.files[0]);
            avatarUrl = storage.getFileView(BUCKET_ID, avatarFile.$id).href;
            console.log('[Profile] Avatar uploaded:', avatarUrl);
          }

          if (els.editCover.files[0]) {
            console.log('[Profile] Uploading cover...');
            const coverFile = await storage.createFile(BUCKET_ID, ID.unique(), els.editCover.files[0]);
            coverUrl = storage.getFileView(BUCKET_ID, coverFile.$id).href;
            console.log('[Profile] Cover uploaded:', coverUrl);
          }

          console.log('[Profile] Updating document...');
          await databases.updateDocument(DB_ID, PROFILES_COLLECTION, currentProfile.$id, {
            displayName: els.editDisplayName.value,
            userName: els.editUserName.value,
            bio: els.editBio.value,
            avatarUrl,
            coverUrl
          });

          showAlert('Profile updated successfully!', 'success');
          els.editModal.classList.remove('active');
          setTimeout(() => location.reload(), 1000);
        } catch (error) {
          console.error('[Profile] Save error:', error);
          showAlert(`Upload failed: ${error?.message || 'Check bucket permissions'}`, 'error');
        } finally {
          els.saveBtn.disabled = false;
          els.saveBtn.textContent = 'Save Changes';
        }
      });

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        if (!confirm('Sign out?')) return;
        try {
          await account.deleteSession('current');
          window.location.href = 'login.html';
        } catch (error) {
          showAlert('Failed to sign out', 'error');
        }
      });

      window.shareArticle = shareArticle;
      loadProfile();
    });
  </script>
</body>
</html>
