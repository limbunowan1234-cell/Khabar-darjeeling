<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khabar Darjeeling - Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --brand-red:#c41e3a;
      --brand-red-dark:#a01830;
      --bg:#f0f2f5;
      --card:#fff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow:0 12px 30px rgba(0,0,0,.08);
      --input-bg:#fff;
      --input-text:#111827;
      --toggle-bg:#f3f4f6;
      --toggle-text:#374151;
      --danger:#b91c1c;
      --success:#15803d;
    }
    [data-theme="dark"]{
      --bg:#0f172a;
      --card:#111827;
      --text:#f3f4f6;
      --muted:#9ca3af;
      --border:#243244;
      --shadow:0 16px 40px rgba(0,0,0,.35);
      --input-bg:#0b1220;
      --input-text:#f9fafb;
      --toggle-bg:#1f2937;
      --toggle-text:#e5e7eb;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .wrap{width:100%;max-width:396px}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .brand img{width:40px;height:40px;object-fit:contain;flex:0 0 auto}
    .brand-name{font-size:14px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .theme-btn{
      border:1px solid var(--border);background:var(--card);color:var(--toggle-text);width:42px;height:42px;border-radius:12px;display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow)
    }
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);padding:28px 22px 22px}
    h1{margin:16px 0 8px;font-size:24px;line-height:1.15;text-align:center}
    .subtitle{margin:0 0 18px;text-align:center;color:var(--muted);font-size:14px}
    .status{min-height:20px;font-size:13px;text-align:center;margin:6px 0 14px}
    .status.error{color:var(--danger)}
    .status.success{color:var(--success)}
    .form{display:none}
    .field{margin-bottom:14px}
    label{display:block;font-size:13px;font-weight:500;margin-bottom:8px}
    .input-wrap{position:relative}
    input{
      width:100%;border:1px solid var(--border);background:var(--input-bg);color:var(--input-text);border-radius:14px;padding:14px 48px 14px 14px;font-size:15px;outline:none;font-family:inherit;transition:border-color .2s, box-shadow .2s
    }
    input:focus{border-color:var(--brand-red);box-shadow:0 0 0 3px rgba(196,30,58,.12)}
    .eye-btn{
      position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:var(--toggle-bg);color:var(--toggle-text);width:34px;height:34px;border-radius:10px;cursor:pointer;display:grid;place-items:center
    }
    .primary{
      width:100%;border:none;background:var(--brand-red);color:#fff;border-radius:14px;padding:14px 16px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px
    }
    .primary:hover{background:var(--brand-red-dark)}
    .primary:disabled{opacity:.75;cursor:not-allowed}
    .back{display:inline-block;width:100%;text-align:center;margin-top:14px;color:var(--brand-red);text-decoration:none;font-size:14px;font-weight:500}
    .loader{display:inline-block;width:14px;height:14px;border:2px solid rgba(196,30,58,.25);border-top-color:var(--brand-red);border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:420px){.card{padding:24px 18px 20px;border-radius:22px}h1{font-size:22px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img src="assets/logo.png" alt="Khabar Darjeeling logo">
        <div class="brand-name">Khabar Darjeeling</div>
      </div>
      <button class="theme-btn" id="themeToggle" type="button" aria-label="Toggle dark mode">☾</button>
    </div>

    <div class="card">
      <h1>Reset Password</h1>
      <p class="subtitle" id="instruction">Verifying your reset link...</p>
      <div id="status" class="status"></div>

      <form id="resetForm" class="form" autocomplete="off">
        <div class="field">
          <label for="password">New password (min 8 chars)</label>
          <div class="input-wrap">
            <input id="password" type="password" minlength="8" placeholder="Enter new password" required>
            <button class="eye-btn" type="button" data-target="password" aria-label="Show password">👁</button>
          </div>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm new password</label>
          <div class="input-wrap">
            <input id="confirmPassword" type="password" minlength="8" placeholder="Confirm new password" required>
            <button class="eye-btn" type="button" data-target="confirmPassword" aria-label="Show password">👁</button>
          </div>
        </div>

        <button class="primary" id="submitBtn" type="submit">Update Password</button>
      </form>

      <a class="back" href="login.html">Back to Login</a>
    </div>
  </div>

  <script type="module">
    (async () => {
      try {
        const { Client, Account } = await import('https://cdn.jsdelivr.net/npm/appwrite@14.0.1/+esm');

        const client = new Client()
          .setEndpoint('https://nyc.cloud.appwrite.io/v1')
          .setProject('khabardarjeeling');

        const account = new Account(client);

        const statusEl = document.getElementById('status');
        const instructionEl = document.getElementById('instruction');
        const formEl = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const passwordEl = document.getElementById('password');
        const confirmPasswordEl = document.getElementById('confirmPassword');
        const themeToggle = document.getElementById('themeToggle');

        const setStatus = (msg, type = '') => {
          statusEl.className = `status ${type}`.trim();
          statusEl.innerHTML = msg;
        };

        const showForm = () => { formEl.style.display = 'block'; instructionEl.textContent = 'Set a new password for your account.'; passwordEl.focus(); };
        const hideForm = () => { formEl.style.display = 'none'; };

        const savedTheme = localStorage.getItem('kd-theme');
        if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀' : '☾';

        themeToggle.addEventListener('click', () => {
          const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('kd-theme', 'light');
            themeToggle.textContent = '☾';
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('kd-theme', 'dark');
            themeToggle.textContent = '☀';
          }
        });

        document.querySelectorAll('.eye-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const target = document.getElementById(btn.dataset.target);
            const isPwd = target.type === 'password';
            target.type = isPwd ? 'text' : 'password';
            btn.textContent = isPwd ? '🙈' : '👁';
          });
        });

        const params = new URLSearchParams(window.location.search);
        const userId = params.get('userId');
        const secret = params.get('secret');

        if (!userId || !secret) {
          hideForm();
          setStatus('Invalid reset link. Please request a new password reset email.', 'error');
          instructionEl.textContent = 'Reset link missing required information.';
          return;
        }

        try {
          setStatus('<span class="loader"></span>Verifying your reset link...');
          await account.updateMagicURLSession(userId, secret);
          setStatus('Reset link verified. Enter your new password below.');
          showForm();
        } catch (e) {
          hideForm();
          setStatus('Invalid or expired reset link. Please request a new password reset email.', 'error');
          instructionEl.textContent = 'Reset link verification failed.';
          return;
        }

        formEl.addEventListener('submit', async (e) => {
          e.preventDefault();
          const newPassword = passwordEl.value.trim();
          const confirmPassword = confirmPasswordEl.value.trim();

          if (newPassword.length < 8) {
            setStatus('Password must be at least 8 characters long.', 'error');
            passwordEl.focus();
            return;
          }

          if (newPassword !== confirmPassword) {
            setStatus('Passwords do not match.', 'error');
            confirmPasswordEl.focus();
            return;
          }

          try {
            submitBtn.disabled = true;
            setStatus('<span class="loader"></span>Updating password...');
            await account.updatePassword(newPassword);
            setStatus('✓ Password updated! Redirecting to login...', 'success');
            formEl.reset();
            setTimeout(() => window.location.href = 'login.html', 2000);
          } catch (e) {
            setStatus('Could not update password. Please try again.', 'error');
          } finally {
            submitBtn.disabled = false;
          }
        });
      } catch (e) {
        const statusEl = document.getElementById('status');
        const instructionEl = document.getElementById('instruction');
        instructionEl.textContent = 'Reset page failed to load.';
        statusEl.className = 'status error';
        statusEl.textContent = 'Could not initialize the reset page.';
      }
    })();
  </script>
</body>
</html>
