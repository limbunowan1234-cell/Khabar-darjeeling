<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article • Khabar Darjeeling</title>
  <link rel="stylesheet" href="css/style.css?v=128">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <meta name="theme-color" content="#c41e3a">
  <style>
    body.dark-mode { background:#121212;color:#e0e0e0; }
    .article-header { margin-bottom:24px; }
    .article-title { font-size:28px;line-height:1.3;margin:12px 0;color:#1a1a1a; }
    body.dark-mode .article-title { color:#fff; }
    .article-meta {
      display:flex;flex-wrap:wrap;gap:16px;color:#666;font-size:14px;
      margin:16px 0;padding:16px 0;border-top:1px solid #eee;border-bottom:1px solid #eee;
    }
    body.dark-mode .article-meta { color:#aaa;border-color:#333; }
    .meta-item { display:flex;align-items:center;gap:6px; }
    .meta-item a { color:inherit;text-decoration:none;font-weight:600; }
    .meta-item a:hover { color:#c41e3a; }
    .article-image { width:100%;max-height:500px;object-fit:cover;border-radius:12px;margin:20px 0; }
    .article-video { width:100%;aspect-ratio:16/9;border-radius:12px;margin:20px 0 8px;border:none; }
    .video-wrap { width:100%; margin:20px 0 8px; }
    .video-wrap .article-video { margin:0; }
    .watch-yt-link { display:inline-flex; align-items:center; gap:6px; color:#c41e3a; font-weight:600; font-size:13px; text-decoration:none; margin:0 0 16px; }
    .watch-yt-link:hover { text-decoration:underline; }
    .article-content { font-size:17px;line-height:1.8;color:#333;white-space:pre-wrap; }
    body.dark-mode .article-content { color:#ddd; }
    .article-actions {
      display:flex;flex-wrap:wrap;gap:10px;margin:24px 0;padding:20px 0;
      border-top:2px solid #f0f0f0;border-bottom:2px solid #f0f0f0;
    }
    body.dark-mode .article-actions { border-color:#2a2a2a; }
    .action-btn {
      background:#f5f5f5;border:none;padding:10px 18px;border-radius:24px;
      font-size:15px;cursor:pointer;display:flex;align-items:center;gap:6px;
      font-weight:500;transition:all .2s;color:#333;
    }
    body.dark-mode .action-btn { background:#2a2a2a;color:#ddd; }
    .action-btn:hover { background:#e8e8e8;transform:translateY(-1px); }
    body.dark-mode .action-btn:hover { background:#333; }
    .action-btn.liked { background:#ffebee;color:#c41e3a; }
    body.dark-mode .action-btn.liked { background:#3a1a1f;color:#ff6b6b; }
    .action-btn:disabled { opacity:0.6;cursor:not-allowed; }
    .view-count { margin-left:auto;color:#666;font-size:14px;display:flex;align-items:center;gap:4px; }
    body.dark-mode .view-count { color:#999; }
    .comments-section { margin-top:32px; }
    .comment-box { display:flex;gap:10px;margin:16px 0; }
    .comment-input { flex:1;padding:12px;border:1px solid #ddd;border-radius:24px;font-size:15px;font-family:inherit; }
    body.dark-mode .comment-input { background:#2a2a2a;border-color:#444;color:#fff; }
    .comment { padding:16px 0;border-bottom:1px solid #f5f5f5;display:flex;gap:12px; }
    body.dark-mode .comment { border-color:#2a2a2a; }
    .comment-avatar { width:36px;height:36px;border-radius:50%;background:#c41e3a;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0; }
    .comment-avatar img { width:100%;height:100%;border-radius:50%;object-fit:cover; }
    .comment-author { font-weight:600;color:#1a1a1a; }
    body.dark-mode .comment-author { color:#fff; }
    .comment-date { color:#999;font-size:12px;margin-left:8px; }
    .comment-text { margin:6px 0 0;color:#333;line-height:1.5; }
    body.dark-mode .comment-text { color:#ddd; }
    .back-btn { display:inline-flex;align-items:center;gap:6px;color:#666;text-decoration:none;margin-bottom:20px;font-size:14px; }
    .back-btn:hover { color:#c41e3a; }
    body.dark-mode .back-btn { color:#aaa; }
    /* Follow on WhatsApp banner (article page) */
    .wa-follow-inner {
      display:flex;align-items:center;gap:16px;flex-wrap:wrap;
      background:linear-gradient(135deg,#25D366,#128C7E);
      border-radius:14px;padding:16px 22px;margin:28px 0;
    }
    .wa-follow-btn {
      background:#fff;color:#128C7E;padding:11px 22px;border-radius:24px;
      font-weight:700;font-size:0.9rem;text-decoration:none;white-space:nowrap;
    }
    @media(max-width:768px){
      .article-title { font-size:22px; }
      .article-actions { justify-content:center; }
      .view-count { width:100%;justify-content:center;margin:10px 0 0; }
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <header class="header" style="position:sticky;top:0;z-index:100;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.05)">
    <div class="container header-inner" style="padding:12px 20px;display:flex;justify-content:space-between;align-items:center;">
      <a href="index.html" class="logo" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:8px;">
        <img src="assets/logo.png" style="height:36px;width:36px;border-radius:50%;object-fit:cover;">
        <h1 style="font-size:18px;margin:0;color:#c41e3a;">खबर दार्जिलिंग</h1>
      </a>
      <a href="index.html" class="btn btn-outline">Home</a>
    </div>
  </header>

  <main class="container" style="max-width:800px;padding:20px;margin:0 auto;">
    <a href="index.html" class="back-btn">← Back to News</a>
    <article id="articleContainer">
      <div style="text-align:center;padding:60px 20px">
        <div style="width:40px;height:40px;border:3px solid #f3f3f3;border-top:3px solid #c41e3a;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto"></div>
        <p style="margin-top:16px;color:#666">Loading article...</p>
      </div>
    </article>
  </main>

  <script src="js/appwrite.js?v=133"></script>
  <script>
    // Theme
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    const ENDPOINT = 'https://api.khabardarjeeling.space/v1';
    const PROJECT  = 'khabardarjeeling';
    const SITE_URL = 'https://khabardarjeeling.space';

    const articleId = new URLSearchParams(location.search).get('id');
    let currentArticle = null;
    let currentUser    = null;
    let userHasLiked   = false;
    let likeRowId      = null;   // the $id of this user's like row

    function esc(t){ const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }
    function initials(name){
      if(!name) return 'U';
      const p=name.trim().split(/\s+/);
      return p.length===1 ? p[0][0].toUpperCase() : (p[0][0]+p[p.length-1][0]).toUpperCase();
    }

    /* ── NewsArticle Schema (Google News / SEO) ── */
    function injectNewsSchema(article) {
      try {
        // Resolve a usable image URL for the schema
        let imageUrl = `${SITE_URL}/assets/logo.png`;
        if (article.youtube_id) {
          imageUrl = `https://img.youtube.com/vi/${article.youtube_id}/maxresdefault.jpg`;
        } else if (article.imageFileId && !['Text','null','undefined',''].includes(String(article.imageFileId))) {
          imageUrl = String(article.imageFileId).startsWith('http')
            ? article.imageFileId
            : `${ENDPOINT}/storage/buckets/${window.APPWRITE_BUCKET_ID}/files/${article.imageFileId}/view?project=${PROJECT}`;
        }

        // Plain-text description from content (first 200 chars, no HTML)
        const tmp = document.createElement('div');
        tmp.textContent = article.content || '';
        const description = (tmp.textContent || '').slice(0, 200).trim();

        const published = new Date(article.publishedAt || article.submittedAt || article.$createdAt).toISOString();
        const modified  = new Date(article.$updatedAt || article.publishedAt || article.$createdAt).toISOString();
        const authorName = article.submitterName || article.authorName || 'Staff Reporter';
        const authorId   = article.submitterId;
        const pageUrl    = `${SITE_URL}/article.html?id=${article.$id}`;

        const schema = {
          "@context": "https://schema.org",
          "@type": "NewsArticle",
          "mainEntityOfPage": { "@type": "WebPage", "@id": pageUrl },
          "headline": (article.title || '').slice(0, 110),
          "description": description,
          "image": [imageUrl],
          "datePublished": published,
          "dateModified": modified,
          "author": {
            "@type": "Person",
            "name": authorName,
            ...(authorId ? { "url": `${SITE_URL}/profile.html?userId=${authorId}` } : {})
          },
          "publisher": {
            "@type": "Organization",
            "name": "Khabar Darjeeling",
            "logo": {
              "@type": "ImageObject",
              "url": `${SITE_URL}/assets/logo.png`,
              "width": 200,
              "height": 200
            }
          },
          ...(article.category ? { "articleSection": article.category } : {})
        };

        const tag = document.createElement('script');
        tag.type = 'application/ld+json';
        tag.id = 'newsArticleSchema';
        tag.textContent = JSON.stringify(schema);
        // Remove any prior schema before adding (in case of re-render)
        document.getElementById('newsArticleSchema')?.remove();
        document.head.appendChild(tag);

        // Also set meta description + canonical for SEO
        let metaDesc = document.querySelector('meta[name="description"]');
        if (!metaDesc) { metaDesc = document.createElement('meta'); metaDesc.name = 'description'; document.head.appendChild(metaDesc); }
        metaDesc.content = description;

        let canonical = document.querySelector('link[rel="canonical"]');
        if (!canonical) { canonical = document.createElement('link'); canonical.rel = 'canonical'; document.head.appendChild(canonical); }
        canonical.href = pageUrl;

        // Open Graph tags (social sharing + helps news discovery)
        const ogTags = {
          'og:type': 'article',
          'og:title': article.title || '',
          'og:description': description,
          'og:image': imageUrl,
          'og:url': pageUrl,
          'article:published_time': published,
          'article:author': authorName
        };
        Object.entries(ogTags).forEach(([prop, val]) => {
          let m = document.querySelector(`meta[property="${prop}"]`);
          if (!m) { m = document.createElement('meta'); m.setAttribute('property', prop); document.head.appendChild(m); }
          m.content = val;
        });
      } catch(e) {
        console.warn('Schema injection failed:', e);
      }
    }

    async function start() {
      // wait for appwrite.js
      let tries = 0;
      while ((!window.databases || !window.account) && tries < 40) {
        await new Promise(r => setTimeout(r, 100)); tries++;
      }
      try { currentUser = await window.account.get(); } catch { currentUser = null; }
      loadArticle();
    }

    async function loadArticle() {
      if (!articleId) {
        document.getElementById('articleContainer').innerHTML = '<p style="text-align:center;padding:40px;">Article not found.</p>';
        return;
      }
      try {
        const article = await window.databases.getDocument(window.APPWRITE_DB_ID, window.COL_ARTICLES, articleId);
        currentArticle = article;
        document.title = article.title + ' • Khabar Darjeeling';

        // Inject NewsArticle schema as early as possible
        injectNewsSchema(article);

        // Media: youtube embed (with always-present YouTube link) > image
        let mediaHtml = '';
        if (article.youtube_id) {
          const vid = esc(article.youtube_id);
          mediaHtml = `
            <div class="video-wrap">
              <iframe class="article-video"
                      src="https://www.youtube.com/embed/${vid}"
                      title="${esc(article.title)}"
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                      allowfullscreen></iframe>
            </div>
            <a class="watch-yt-link" href="https://www.youtube.com/watch?v=${vid}" target="_blank" rel="noopener">
              ▶ Video not playing? Watch on YouTube
            </a>`;
        } else if (article.imageFileId && !['Text','null','undefined',''].includes(String(article.imageFileId))) {
          const src = String(article.imageFileId).startsWith('http')
            ? article.imageFileId
            : `${ENDPOINT}/storage/buckets/${window.APPWRITE_BUCKET_ID}/files/${article.imageFileId}/view?project=${PROJECT}`;
          mediaHtml = `<img src="${src}" alt="${esc(article.title)}" class="article-image" onerror="this.style.display='none'">`;
        }

        const pubDate = new Date(article.publishedAt || article.submittedAt || article.$createdAt)
          .toLocaleString('en-IN', {
            day:'numeric', month:'long', year:'numeric',
            hour:'numeric', minute:'2-digit', hour12:true,
            timeZone:'Asia/Kolkata'
          });

        const authorName = article.submitterName || article.authorName || 'Staff Reporter';
        const authorId   = article.submitterId;
        const authorEl   = authorId
          ? `<a href="profile.html?userId=${authorId}">${esc(authorName)}</a>`
          : `<strong>${esc(authorName)}</strong>`;

        document.getElementById('articleContainer').innerHTML = `
          <div class="article-header">
            <span style="background:#c41e3a;color:#fff;padding:4px 12px;border-radius:4px;font-size:12px;font-weight:600;text-transform:uppercase">${esc(article.category)}</span>
            <h1 class="article-title">${esc(article.title)}</h1>
            <div class="article-meta">
              <div class="meta-item">👤 ${authorEl}</div>
              <div class="meta-item">📅 ${pubDate}</div>
              <div class="meta-item">📍 ${esc(article.location || 'Darjeeling')}</div>
            </div>
          </div>

          ${mediaHtml}

          <div class="article-content">${esc(article.content)}</div>

          <div class="wa-follow-inner">
            <div style="font-size:1.8rem;">💬</div>
            <div style="flex:1;min-width:180px;">
              <strong style="color:#fff;font-size:1rem;display:block;">Follow Khabar Darjeeling on WhatsApp</strong>
              <span style="color:rgba(255,255,255,0.92);font-size:0.82rem;">Breaking news &amp; road/weather alerts on your phone</span>
            </div>
            <a href="https://whatsapp.com/channel/0029VbD933y3LdQQ0g9Z682b" target="_blank" rel="noopener" class="wa-follow-btn">📲 Follow Channel</a>
          </div>

          <div class="article-actions">
            <button id="likeBtn" class="action-btn">🤍 <span id="likeCount">0</span></button>
            <button id="shareBtn" class="action-btn">🔗 Share</button>
            <button id="commentBtn" class="action-btn">💬 <span id="commentCount">0</span></button>
            <div class="view-count">👁️ <span id="viewCount">${article.views || 0}</span> views</div>
          </div>

          <div id="commentsSection" class="comments-section">
            <h3 style="margin-bottom:16px" id="comments">Comments</h3>
            <div class="comment-box">
              <input id="commentInput" class="comment-input" placeholder="${currentUser ? 'Add a comment...' : 'Login to comment'}" ${currentUser ? '' : 'disabled'}>
              <button onclick="postComment()" class="btn btn-primary" id="postBtn" ${currentUser ? '' : 'disabled'}>Post</button>
            </div>
            ${currentUser ? '' : '<p style="color:#999;font-size:13px;text-align:center"><a href="login.html" style="color:#c41e3a;">Login</a> to comment</p>'}
            <div id="commentsList" style="margin-top:20px"></div>
          </div>
        `;

        incrementView();
        setupActions();
        loadLikes();
        loadComments();

        // Auto-scroll if URL has #comments
        if (location.hash === '#comments') {
          setTimeout(() => document.getElementById('comments')?.scrollIntoView({ behavior:'smooth' }), 400);
        }
      } catch(err) {
        console.error('Article load error:', err);
        document.getElementById('articleContainer').innerHTML = '<p style="color:red;text-align:center;padding:40px">Error loading article.</p>';
      }
    }

    async function incrementView() {
      try {
        const newViews = (currentArticle.views || 0) + 1;
        await window.databases.updateDocument(window.APPWRITE_DB_ID, window.COL_ARTICLES, articleId, { views: newViews });
        document.getElementById('viewCount').textContent = newViews;
        currentArticle.views = newViews;
      } catch(e) { /* views are non-critical */ }
    }

    /* ── LIKES (from `likes` collection) ── */
    async function loadLikes() {
      try {
        // Total like count for this article
        const all = await window.databases.listDocuments(
          window.APPWRITE_DB_ID, window.COL_LIKES,
          [ window.Query.equal('articleId', articleId), window.Query.limit(1000) ]
        );
        document.getElementById('likeCount').textContent = all.total;

        // Has the current user liked?
        if (currentUser) {
          const mine = all.documents.find(d => d.userId === currentUser.$id);
          if (mine) { userHasLiked = true; likeRowId = mine.$id; markLiked(true); }
        }
      } catch(e) { console.warn('loadLikes failed:', e); }
    }

    function markLiked(liked) {
      const btn = document.getElementById('likeBtn');
      const count = document.getElementById('likeCount');
      if (liked) { btn.classList.add('liked'); btn.querySelector('span') || null; btn.innerHTML = `❤️ <span id="likeCount">${count.textContent}</span>`; }
      else { btn.classList.remove('liked'); btn.innerHTML = `🤍 <span id="likeCount">${count.textContent}</span>`; }
    }

    function setupActions() {
      // LIKE
      document.getElementById('likeBtn').onclick = async () => {
        if (!currentUser) { location.href = 'login.html'; return; }
        const btn = document.getElementById('likeBtn');
        btn.disabled = true;
        const countEl = document.getElementById('likeCount');
        let count = parseInt(countEl.textContent) || 0;

        try {
          // Always check the real state first (don't trust a stale likeRowId,
          // e.g. when the user liked this article from the homepage)
          const existing = await window.databases.listDocuments(
            window.APPWRITE_DB_ID, window.COL_LIKES,
            [ window.Query.equal('articleId', articleId),
              window.Query.equal('userId', currentUser.$id),
              window.Query.limit(1) ]
          );

          if (existing.documents.length) {
            // Already liked → unlike
            await window.databases.deleteDocument(window.APPWRITE_DB_ID, window.COL_LIKES, existing.documents[0].$id);
            userHasLiked = false; likeRowId = null;
            count = Math.max(0, count - 1);
            btn.classList.remove('liked');
            btn.innerHTML = `🤍 <span id="likeCount">${count}</span>`;
          } else {
            // Not liked → like
            const row = await window.databases.createDocument(
              window.APPWRITE_DB_ID, window.COL_LIKES, 'unique()',
              { articleId, userId: currentUser.$id }
            );
            userHasLiked = true; likeRowId = row.$id;
            count = count + 1;
            btn.classList.add('liked');
            btn.innerHTML = `❤️ <span id="likeCount">${count}</span>`;
          }
        } catch(e) {
          console.error('Like failed:', e, e && e.message, e && e.code);
          alert('Could not update like: ' + ((e && e.message) || 'unknown error'));
        }
        btn.disabled = false;
      };

      // SHARE
      document.getElementById('shareBtn').onclick = () => {
        if (navigator.share) {
          navigator.share({ title: currentArticle.title, url: location.href }).catch(()=>{});
        } else {
          navigator.clipboard.writeText(location.href);
          const btn = document.getElementById('shareBtn');
          const orig = btn.innerHTML;
          btn.innerHTML = '✓ Copied!';
          setTimeout(() => btn.innerHTML = orig, 2000);
        }
      };

      // COMMENT toggle — just scroll to comments
      document.getElementById('commentBtn').onclick = () => {
        document.getElementById('comments')?.scrollIntoView({ behavior:'smooth' });
        document.getElementById('commentInput')?.focus();
      };
    }

    /* ── COMMENTS (from `comments` collection) ── */
    async function loadComments() {
      try {
        const res = await window.databases.listDocuments(
          window.APPWRITE_DB_ID, window.COL_COMMENTS,
          [ window.Query.equal('articleId', articleId),
            window.Query.orderDesc('$createdAt'),
            window.Query.limit(100) ]
        );
        document.getElementById('commentCount').textContent = res.total;

        const list = document.getElementById('commentsList');
        if (!res.documents.length) {
          list.innerHTML = '<p style="color:#999;text-align:center;padding:20px">No comments yet. Be the first!</p>';
          return;
        }
        list.innerHTML = res.documents.map(c => {
          const name   = c.authorName || 'Anonymous';
          const avatar = c.avatarUrl;
          const date   = new Date(c.createdAt || c.$createdAt).toLocaleString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'numeric', minute:'2-digit', hour12:true, timeZone:'Asia/Kolkata' });
          const avatarEl = (avatar && avatar !== 'null' && avatar !== '')
            ? `<div class="comment-avatar"><img src="${avatar}" onerror="this.parentElement.textContent='${initials(name)}'"></div>`
            : `<div class="comment-avatar">${initials(name)}</div>`;
          return `
            <div class="comment">
              ${avatarEl}
              <div style="flex:1;">
                <div><span class="comment-author">${esc(name)}</span><span class="comment-date">${date}</span></div>
                <p class="comment-text">${esc(c.commentText || c.comment || '')}</p>
              </div>
            </div>`;
        }).join('');
      } catch(e) {
        console.warn('loadComments failed:', e);
      }
    }

    window.postComment = async function() {
      const input = document.getElementById('commentInput');
      const text  = input.value.trim();
      if (!text || !currentUser) return;

      const btn = document.getElementById('postBtn');
      btn.disabled = true;

      try {
        // Try to get the user's profile for avatar + display name
        let displayName = currentUser.name || currentUser.email.split('@')[0];
        let avatarUrl = '';
        try {
          const prof = await window.databases.listDocuments(
            window.APPWRITE_DB_ID, window.COL_PROFILES,
            [ window.Query.equal('userId', currentUser.$id), window.Query.limit(1) ]
          );
          if (prof.documents.length) {
            displayName = prof.documents[0].displayName || displayName;
            avatarUrl   = prof.documents[0].avatarUrl || '';
          }
        } catch(e) { /* profile optional */ }

        await window.databases.createDocument(
          window.APPWRITE_DB_ID, window.COL_COMMENTS, 'unique()',
          {
            articleId,
            userId:      currentUser.$id,
            authorName:  displayName,
            commentText: text,
            createdAt:   new Date().toISOString()
          }
        );
        input.value = '';
        loadComments();
      } catch(e) {
        console.error('Post comment failed:', e, e && e.message, e && e.code);
        alert('Error posting comment: ' + ((e && e.message) || 'unknown error'));
      }
      btn.disabled = false;
    };

    start();
  </script>
</body>
</html>
