<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article • Khabar Darjeeling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --brand:#c41e3a;
      --brand-dark:#a01830;
      --bg:#f0f2f5;
      --card:#fff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow:0 12px 30px rgba(0,0,0,.08);
      --input-bg:#fff;
      --input-text:#111827;
    }
    [data-theme="dark"]{
      --bg:#0f172a;
      --card:#111827;
      --text:#f3f4f6;
      --muted:#9ca3af;
      --border:#243244;
      --shadow:0 16px 40px rgba(0,0,0,.35);
      --input-bg:#0b1220;
      --input-text:#f9fafb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:20px;
    }
    .wrap{max-width:900px;margin:0 auto}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
    .brand img{width:44px;height:44px;border-radius:50%;object-fit:cover}
    .theme-btn{
      border:1px solid var(--border);background:var(--card);color:var(--text);
      width:42px;height:42px;border-radius:12px;cursor:pointer;box-shadow:var(--shadow)
    }
    .card{
      background:var(--card);border:1px solid var(--border);border-radius:20px;
      box-shadow:var(--shadow);padding:22px
    }
    .title{font-size:30px;line-height:1.2;margin:0 0 10px}
    .meta{display:flex;flex-wrap:wrap;gap:10px;color:var(--muted);font-size:13px;margin-bottom:18px}
    .media{width:100%;border-radius:16px;overflow:hidden;margin:18px 0}
    .media img,.media iframe{width:100%;min-height:260px;border:0;display:block}
    .content{font-size:16px;line-height:1.8;color:var(--text)}
    .actions{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
      margin-top:20px;padding-top:16px;border-top:1px solid var(--border)
    }
    .btn{
      border:none;border-radius:999px;padding:10px 14px;cursor:pointer;
      font:inherit;display:inline-flex;align-items:center;gap:8px
    }
    .btn-like{background:#f4f4f4;color:#222}
    .btn-like.active{background:var(--brand);color:#fff}
    .btn-share{background:#f4f4f4;color:#222}
    .btn-link{
      text-decoration:none;background:#f4f4f4;color:#222;border-radius:999px;
      padding:10px 14px;display:inline-flex;align-items:center;gap:8px
    }
    .section-title{font-size:20px;margin:26px 0 14px}
    .comment-form{
      display:grid;gap:10px;margin-bottom:16px
    }
    textarea{
      width:100%;min-height:110px;resize:vertical;border:1px solid var(--border);
      border-radius:14px;padding:14px;font:inherit;background:var(--input-bg);color:var(--input-text)
    }
    .comment-form button{
      width:max-content;border:none;background:var(--brand);color:#fff;
      padding:10px 16px;border-radius:12px;font-weight:600;cursor:pointer
    }
    .comment-form button:hover{background:var(--brand-dark)}
    .comment{
      background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:14px;margin-bottom:12px
    }
    .comment-head{display:flex;justify-content:space-between;gap:10px;font-size:13px;color:var(--muted);margin-bottom:8px}
    .empty{color:var(--muted);font-size:14px}
    .back{
      display:inline-block;margin-top:18px;color:var(--brand);text-decoration:none;font-weight:600
    }
    @media (max-width:640px){
      .title{font-size:24px}
      .card{padding:18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="Khabar Darjeeling">
        <strong>खबर दार्जिलिंग</strong>
      </a>
      <button class="theme-btn" id="themeToggle" type="button">🌙</button>
    </div>

    <div class="card">
      <h1 class="title" id="title">Loading...</h1>
      <div class="meta" id="meta"></div>
      <div class="media" id="media"></div>
      <div class="content" id="content"></div>

      <div class="actions">
        <button class="btn btn-like" id="likeBtn" type="button">❤️ <span id="likeCount">0</span></button>
        <a class="btn-link" href="#comments">💬 <span id="commentCount">0</span></a>
        <button class="btn btn-share" id="shareBtn" type="button">🔗 Share</button>
      </div>

      <h2 class="section-title" id="comments">Comments</h2>
      <div class="comment-form">
        <textarea id="commentInput" placeholder="Write a comment..."></textarea>
        <button id="submitComment" type="button">Post Comment</button>
      </div>

      <div id="commentList"></div>

      <a class="back" href="index.html">← Back to Home</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const articleId = params.get('id') || 'demo';

    const article = {
      title: 'Sample Article Title',
      author: 'Guest',
      date: new Date().toLocaleDateString(),
      content: 'This is a simple article page template. Replace this with Appwrite data from your articles collection.',
      imageUrl: '',
      youtube_id: ''
    };

    const titleEl = document.getElementById('title');
    const metaEl = document.getElementById('meta');
    const mediaEl = document.getElementById('media');
    const contentEl = document.getElementById('content');
    const likeBtn = document.getElementById('likeBtn');
    const likeCountEl = document.getElementById('likeCount');
    const commentInput = document.getElementById('commentInput');
    const submitComment = document.getElementById('submitComment');
    const commentList = document.getElementById('commentList');
    const commentCountEl = document.getElementById('commentCount');
    const themeToggle = document.getElementById('themeToggle');
    const shareBtn = document.getElementById('shareBtn');

    titleEl.textContent = article.title;
    metaEl.innerHTML = `<span>By ${article.author}</span><span>•</span><span>${article.date}</span>`;
    contentEl.textContent = article.content;

    if (article.imageUrl) {
      mediaEl.innerHTML = `<img src="${article.imageUrl}" alt="${article.title}">`;
    } else if (article.youtube_id) {
      mediaEl.innerHTML = `<iframe src="https://www.youtube.com/embed/${article.youtube_id}" allowfullscreen></iframe>`;
    } else {
      mediaEl.style.display = 'none';
    }

    let likes = Number(localStorage.getItem(`likes-${articleId}`) || 0);
    let liked = localStorage.getItem(`liked-${articleId}`) === '1';
    likeCountEl.textContent = likes;
    if (liked) likeBtn.classList.add('active');

    likeBtn.addEventListener('click', () => {
      liked = !liked;
      likes = liked ? likes + 1 : Math.max(0, likes - 1);
      localStorage.setItem(`liked-${articleId}`, liked ? '1' : '0');
      localStorage.setItem(`likes-${articleId}`, String(likes));
      likeCountEl.textContent = likes;
      likeBtn.classList.toggle('active', liked);
    });

    const commentsKey = `comments-${articleId}`;
    const comments = JSON.parse(localStorage.getItem(commentsKey) || '[]');

    function renderComments() {
      commentList.innerHTML = comments.length
        ? comments.map(c => `
            <div class="comment">
              <div class="comment-head">
                <strong>${c.name}</strong>
                <span>${c.time}</span>
              </div>
              <div>${c.text}</div>
            </div>
          `).join('')
        : `<div class="empty">No comments yet.</div>`;
      commentCountEl.textContent = comments.length;
    }

    submitComment.addEventListener('click', () => {
      const text = commentInput.value.trim();
      if (!text) return;
      comments.unshift({
        name: 'Guest',
        text,
        time: new Date().toLocaleString()
      });
      localStorage.setItem(commentsKey, JSON.stringify(comments));
      commentInput.value = '';
      renderComments();
    });

    renderComments();

    shareBtn.addEventListener('click', async () => {
      const url = location.href;
      const shareData = { title: article.title, text: article.content.slice(0, 120), url };
      if (navigator.share) {
        try { await navigator.share(shareData); } catch (e) {}
      } else {
        try {
          await navigator.clipboard.writeText(url);
          alert('Link copied');
        } catch (e) {
          prompt('Copy link', url);
        }
      }
    });

    themeToggle.addEventListener('click', () => {
      document.body.dataset.theme = document.body.dataset.theme === 'dark' ? '' : 'dark';
      themeToggle.textContent = document.body.dataset.theme === 'dark' ? '☀' : '🌙';
    });
  </script>
</body>
</html>
