<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="theme-color" content="#b81d24">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <title>Article - खबर दार्जिलिंग</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=117" />
  <style>
    :root {
      --primary: #c41e3a;
      --bg: #f6f6f6;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #e7e7e7;
    }
    body.dark-mode {
      --bg: #121212;
      --card: #1d1d1d;
      --text: #f4f4f4;
      --muted: #b4b4b4;
      --border: #2c2c2c;
    }
    body {
      margin: 0;
      font-family: 'Poppins', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
  .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
    }
  .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
  .brand {
      font-weight: 700;
      color: var(--primary);
      font-size: 20px;
      text-decoration: none;
    }
  .btn {
      border: none;
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
      font-family: inherit;
    }
  .btn.secondary {
      background: #666;
    }
  .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-top: 18px;
      padding: 24px;
    }
  .category-badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
  .title {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 12px;
      line-height: 1.2;
    }
  .meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 20px;
    }
  .actions {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
  .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
    }
  .action-btn.liked {
      background: rgba(196, 30, 58, 0.1);
      border-color: var(--primary);
      color: var(--primary);
    }
  .share-buttons {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
  .share-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
  .share-btn:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
  .content {
      line-height: 1.8;
      font-size: 16px;
      margin: 24px 0;
      white-space: pre-wrap;
    }
  .content img {
      max-width: 100%;
      border-radius: 12px;
      margin: 16px 0;
    }
  .divider {
      height: 1px;
      background: var(--border);
      margin: 30px 0;
    }
  .comments-section h3 {
      font-size: 20px;
      margin-bottom: 16px;
    }
  .comment-form {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
  .comment-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
    }
  .comment-item {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.01);
    }
    body.dark-mode.comment-item {
      background: rgba(255,255,255,0.02);
    }
  .comment-author {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 4px;
    }
  .comment-text {
      font-size: 15px;
      line-height: 1.6;
    }
  .comment-date {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
  .login-prompt {
      padding: 20px;
      text-align: center;
      background: rgba(196, 30, 58, 0.05);
      border-radius: 12px;
      margin-bottom: 24px;
    }
  .loader {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 640px) {
    .title { font-size: 24px; }
    .share-buttons { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="brand">खबर दार्जिलिंग</a>
    <div>
      <a class="btn secondary" href="index.html">← Back to Home</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div id="loader" class="loader">Loading article...</div>
      
      <div id="articleContent" style="display:none;">
        <span class="category-badge" id="category">GENERAL</span>
        <h1 class="title" id="title">Loading...</h1>
        <div class="meta" id="meta">—</div>
        
        <div class="actions">
          <button class="action-btn" id="likeBtn">
            ❤️ <span id="likeText">Like</span>
          </button>
          <span>👁️ <span id="views">0</span> views</span>
          <span>💬 <span id="commentCount">0</span> comments</span>
          
          <div class="share-buttons">
            <button class="share-btn" onclick="shareArticle('whatsapp')">📱 WhatsApp</button>
            <button class="share-btn" onclick="shareArticle('facebook')">📘 Facebook</button>
            <button class="share-btn" onclick="shareArticle('twitter')">🐦 Twitter</button>
            <button class="share-btn" onclick="shareArticle('copy')">🔗 Copy</button>
          </div>
        </div>

        <div class="content" id="content"></div>

        <div class="divider"></div>

        <div class="comments-section">
          <h3>Discussion (<span id="discussionCount">0</span>)</h3>
          
          <div id="loginPrompt" class="login-prompt" style="display:none;">
            <a href="login.html" class="btn">Log in</a> to post a comment
          </div>

          <form id="commentForm" class="comment-form" style="display:none;">
            <input type="text" class="comment-input" id="commentInput" placeholder="Write a comment..." required>
            <button type="submit" class="btn">Post</button>
          </form>

          <div id="commentsList"></div>
          <div id="commentsLoader" class="loader">Loading comments...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1/dist/iife/sdk.min.js"></script>
  <script src="js/appwrite.js?v=117"></script>
  <script>
    (() => {
      const { Client, Account, Databases, Query, ID } = window.Appwrite;
      const client = new Client()
      .setEndpoint(window.APPWRITE_ENDPOINT)
      .setProject(window.APPWRITE_PROJECT_ID);

      const account = new Account(client);
      const databases = new Databases(client);

      const DB_ID = window.APPWRITE_DB_ID;
      const ARTICLES_COLLECTION = 'articles';
      const LIKES_COLLECTION = 'likes';
      const COMMENTS_COLLECTION = 'comments';

      let currentUser = null;
      let currentArticle = null;
      let currentArticleId = null;
      let isLiked = false;

      const els = {
        loader: document.getElementById('loader'),
        articleContent: document.getElementById('articleContent'),
        category: document.getElementById('category'),
        title: document.getElementById('title'),
        meta: document.getElementById('meta'),
        content: document.getElementById('content'),
        views: document.getElementById('views'),
        likeBtn: document.getElementById('likeBtn'),
        likeText: document.getElementById('likeText'),
        commentCount: document.getElementById('commentCount'),
        discussionCount: document.getElementById('discussionCount'),
        loginPrompt: document.getElementById('loginPrompt'),
        commentForm: document.getElementById('commentForm'),
        commentInput: document.getElementById('commentInput'),
        commentsList: document.getElementById('commentsList'),
        commentsLoader: document.getElementById('commentsLoader')
      };

      function formatDate(v) {
        if (!v) return '—';
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return String(v);
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
      }

      function shareArticle(platform) {
        const url = window.location.href;
        const text = `Check out: ${currentArticle.title}`;

        if (platform === 'whatsapp') {
          window.open(`https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`, '_blank');
        } else if (platform === 'facebook') {
          window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
        } else if (platform === 'twitter') {
          window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        } else if (platform === 'copy') {
          navigator.clipboard.writeText(url);
          alert('Link copied!');
        }
      }

      async function loadArticle() {
        // Wait for session to load
        await new Promise(r => setTimeout(r, 150));

        const urlParams = new URLSearchParams(window.location.search);
        currentArticleId = urlParams.get('id');

        if (!currentArticleId) {
          els.loader.textContent = 'Article not found';
          return;
        }

        try {
          // Try to get user but don't fail if not logged in
          try {
            currentUser = await account.get();
          } catch (e) {
            currentUser = null;
          }

          // Load article - works for everyone because Any → Read
          currentArticle = await databases.getDocument(DB_ID, ARTICLES_COLLECTION, currentArticleId);

          // Increment views ONLY if user is logged in
          try {
            if (currentUser) {
              await databases.updateDocument(DB_ID, ARTICLES_COLLECTION, currentArticleId, {
                views: (currentArticle.views || 0) + 1
              });
              currentArticle.views = (currentArticle.views || 0) + 1;
            }
          } catch (viewError) {
            // Silently fail if view update doesn't work. Article still loads.
            console.log('View count not updated:', viewError.message);
          }

          // Render article
          els.category.textContent = currentArticle.category || 'GENERAL';
          els.title.textContent = currentArticle.title;
          els.meta.textContent = `${currentArticle.submitterName || 'Anonymous'} • ${formatDate(currentArticle.$createdAt)}`;
          els.content.innerHTML = currentArticle.content;
          els.views.textContent = currentArticle.views || 0;

          // Check if liked
          if (currentUser) {
            const likes = await databases.listDocuments(DB_ID, LIKES_COLLECTION, [
              Query.equal('articleId', currentArticleId),
              Query.equal('userId', currentUser.$id),
              Query.limit(1)
            ]);
            isLiked = likes.total > 0;
            if (isLiked) {
              els.likeBtn.classList.add('liked');
              els.likeText.textContent = 'Liked';
            }
            els.commentForm.style.display = 'flex';
          } else {
            els.loginPrompt.style.display = 'block';
          }

          // Load comments
          loadComments();

          els.loader.style.display = 'none';
          els.articleContent.style.display = 'block';

        } catch (error) {
          console.error('Load error:', error);
          els.loader.textContent = 'Failed to load article';
        }
      }

      async function loadComments() {
        try {
          const comments = await databases.listDocuments(DB_ID, COMMENTS_COLLECTION, [
            Query.equal('articleId', currentArticleId),
            Query.orderDesc('$createdAt'),
            Query.limit(100)
          ]);

          els.commentCount.textContent = comments.total;
          els.discussionCount.textContent = comments.total;

          if (comments.documents.length === 0) {
            els.commentsList.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">No comments yet. Be the first!</p>';
          } else {
            els.commentsList.innerHTML = comments.documents.map(c => `
              <div class="comment-item">
                <div class="comment-author">${c.authorName || 'Anonymous'}</div>
                <div class="comment-text">${c.commentText}</div>
                <div class="comment-date">${formatDate(c.$createdAt)}</div>
              </div>
            `).join('');
          }
          els.commentsLoader.style.display = 'none';
        } catch (error) {
          els.commentsLoader.textContent = 'Failed to load comments';
        }
      }

      // Like button
      els.likeBtn.addEventListener('click', async () => {
        if (!currentUser) {
          window.location.href = 'login.html';
          return;
        }

        try {
          if (isLiked) {
            const likes = await databases.listDocuments(DB_ID, LIKES_COLLECTION, [
              Query.equal('articleId', currentArticleId),
              Query.equal('userId', currentUser.$id),
              Query.limit(1)
            ]);
            if (likes.documents.length > 0) {
              await databases.deleteDocument(DB_ID, LIKES_COLLECTION, likes.documents[0].$id);
            }
            els.likeBtn.classList.remove('liked');
            els.likeText.textContent = 'Like';
            isLiked = false;
          } else {
            await databases.createDocument(DB_ID, LIKES_COLLECTION, ID.unique(), {
              articleId: currentArticleId,
              userId: currentUser.$id,
              userEmail: currentUser.email
            });
            els.likeBtn.classList.add('liked');
            els.likeText.textContent = 'Liked';
            isLiked = true;
          }
        } catch (error) {
          console.error('Like error:', error);
          alert('Failed to update like');
        }
      });

      // Comment form
      els.commentForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = els.commentInput.value.trim();
        if (!text ||!currentUser) return;

        try {
          await databases.createDocument(DB_ID, COMMENTS_COLLECTION, ID.unique(), {
            articleId: currentArticleId,
            userId: currentUser.$id,
            authorName: currentUser.name || currentUser.email.split('@')[0],
            commentText: text
          });
          els.commentInput.value = '';
          loadComments();
        } catch (error) {
          alert('Failed to post comment');
        }
      });

      window.shareArticle = shareArticle;

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadArticle);
      } else {
        loadArticle();
      }
    })();
  </script>
</body>
</html>
