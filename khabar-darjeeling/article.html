<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - Khabar Darjeeling</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#c41e3a">
  <style>
   .article-header{margin-bottom:24px}
   .article-title{font-size:28px;line-height:1.3;margin:12px 0;color:#1a1a1a}
   .article-meta{display:flex;flex-wrap:wrap;gap:16px;color:#666;font-size:14px;margin:16px 0;padding:16px 0;border-top:1px solid #eee;border-bottom:1px solid #eee}
   .meta-item{display:flex;align-items:center;gap:6px}
   .article-image{width:100%;max-height:500px;object-fit:cover;border-radius:12px;margin:20px 0}
   .article-content{font-size:17px;line-height:1.8;color:#333;white-space:pre-wrap}
   .article-actions{display:flex;flex-wrap:wrap;gap:10px;margin:24px 0;padding:20px 0;border-top:2px solid #f0f0f0;border-bottom:2px solid #f0f0f0}
   .action-btn{background:#f5f5f5;border:none;padding:10px 18px;border-radius:24px;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:500;transition:all.2s}
   .action-btn:hover{background:#e8e8e8;transform:translateY(-1px)}
   .action-btn.liked{background:#ffebee;color:#c41e3a}
   .view-count{margin-left:auto;color:#666;font-size:14px;display:flex;align-items:center;gap:4px}
   .comments-section{margin-top:32px}
   .comment-box{display:flex;gap:10px;margin:16px 0}
   .comment-input{flex:1;padding:12px;border:1px solid #ddd;border-radius:24px;font-size:15px}
   .comment{padding:16px 0;border-bottom:1px solid #f5f5f5}
   .comment-author{font-weight:600;color:#1a1a1a}
   .comment-date{color:#999;font-size:12px;margin-left:8px}
   .comment-text{margin:6px 0 0 0;color:#333;line-height:1.5}
   .back-btn{display:inline-flex;align-items:center;gap:6px;color:#666;text-decoration:none;margin-bottom:20px;font-size:14px}
   .back-btn:hover{color:#c41e3a}
    @media(max-width:768px){.article-title{font-size:22px}.article-actions{justify-content:center}.view-count{width:100%;justify-content:center;margin:10px 0 0 0}}
  </style>
</head>
<body>
  <header class="header" style="position:sticky;top:0;z-index:100;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.05)">
    <div class="container header-inner" style="padding:12px 20px">
      <a href="/" class="logo" style="text-decoration:none;color:inherit"><h1 style="font-size:20px;margin:0">🏔️ Khabar Darjeeling</h1></a>
      <div class="header-actions">
        <a href="/" class="btn btn-outline">Home</a>
      </div>
    </div>
  </header>

  <main class="container" style="max-width:800px;padding:20px">
    <a href="/" class="back-btn">← Back to News</a>

    <article id="articleContainer">
      <div style="text-align:center;padding:60px 20px">
        <div style="width:40px;height:40px;border:3px solid #f3f3f3;border-top:3px solid #c41e3a;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto"></div>
        <p style="margin-top:16px;color:#666">Loading article...</p>
      </div>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@15.0.0"></script>
  <script src="js/config.js"></script>
  <script>
    const ENDPOINT = 'https://nyc.cloud.appwrite.io/v1';
    const PROJECT = 'khabardarjeeling';
    const DB = 'khabardarjeeling_db';
    const COL = 'articles';

    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');
    const session = localStorage.getItem('kd_jwt');
    const H = session? {'X-Appwrite-Project':PROJECT,'X-Appwrite-Session':session} : {'X-Appwrite-Project':PROJECT};
    let currentArticle = null;

    async function loadArticle(){
      if(!articleId){ document.getElementById('articleContainer').innerHTML='<p>Article not found</p>'; return; }

      try {
        const res = await fetch(`${ENDPOINT}/databases/${DB}/collections/${COL}/documents/${articleId}`,{headers:H});
        const article = await res.json();
        currentArticle = article;

        document.title = article.title + ' - Khabar Darjeeling';

        const imageUrl = article.imageFileId? `${ENDPOINT}/storage/buckets/article_images/files/${article.imageFileId}/preview?project=${PROJECT}&width=1200` : '';
        const pubDate = new Date(article.publishedAt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

        document.getElementById('articleContainer').innerHTML = `
          <div class="article-header">
            <span style="background:#c41e3a;color:#fff;padding:4px 12px;border-radius:4px;font-size:12px;font-weight:600;text-transform:uppercase">${article.category}</span>
            <h1 class="article-title">${article.title}</h1>

            <div class="article-meta">
              <div class="meta-item">👤 <strong>${article.authorName}</strong></div>
              <div class="meta-item">📅 ${pubDate}</div>
              <div class="meta-item">📍 ${article.location || 'Darjeeling'}</div>
            </div>
          </div>

          ${imageUrl? `<img src="${imageUrl}" alt="${article.title}" class="article-image">` : ''}

          <div class="article-content">${article.content}</div>

          <div class="article-actions">
            <button id="likeBtn" class="action-btn">❤️ <span id="likeCount">${article.likes||0}</span></button>
            <button id="shareBtn" class="action-btn">🔗 Share</button>
            <button id="commentBtn" class="action-btn">💬 <span id="commentCount">0</span></button>
            <div class="view-count">👁️ <span id="viewCount">${article.views||0}</span> views</div>
          </div>

          <div id="commentsSection" class="comments-section" style="display:none">
            <h3 style="margin-bottom:16px">Comments</h3>
            <div class="comment-box">
              <input id="commentInput" class="comment-input" placeholder="Add a comment..." ${!session?'disabled':''}>
              <button onclick="postComment()" class="btn btn-primary" ${!session?'disabled':''}>Post</button>
            </div>
            ${!session? '<p style="color:#999;font-size:13px;text-align:center">Login to comment</p>' : ''}
            <div id="commentsList" style="margin-top:20px"></div>
          </div>
        `;

        // Increment view
        incrementView();
        setupActions();
        loadComments();

      } catch(e){
        document.getElementById('articleContainer').innerHTML = `<p style="color:red;text-align:center;padding:40px">Error loading article</p>`;
      }
    }

    async function incrementView(){
      try {
        const newViews = (currentArticle.views||0)+1;
        await fetch(`${ENDPOINT}/databases/${DB}/collections/${COL}/documents/${articleId}`,{
          method:'PATCH',
          headers:{...H,'Content-Type':'application/json'},
          body:JSON.stringify({data:{views:newViews}})
        });
        document.getElementById('viewCount').textContent = newViews;
      } catch(e){}
    }

    function setupActions(){
      // Like
      document.getElementById('likeBtn').onclick = async ()=>{
        if(!session){ location.href='/login.html'; return; }
        const btn = document.getElementById('likeBtn');
        btn.disabled = true;
        try {
          const me = await fetch(`${ENDPOINT}/account`,{headers:H}).then(r=>r.json());
          const newLikes = (currentArticle.likes||0)+1;
          await fetch(`${ENDPOINT}/databases/${DB}/collections/${COL}/documents/${articleId}`,{
            method:'PATCH', headers:{...H,'Content-Type':'application/json'},
            body:JSON.stringify({data:{likes:newLikes}})
          });
          document.getElementById('likeCount').textContent = newLikes;
          btn.classList.add('liked');
          currentArticle.likes = newLikes;
        } catch(e){ alert('Already liked or error'); }
        btn.disabled = false;
      };

      // Share
      document.getElementById('shareBtn').onclick = ()=>{
        if(navigator.share){
          navigator.share({title:currentArticle.title,text:currentArticle.title,url:location.href});
        } else {
          navigator.clipboard.writeText(location.href);
          const btn = document.getElementById('shareBtn');
          const orig = btn.innerHTML;
          btn.innerHTML = '✓ Copied!';
          setTimeout(()=>btn.innerHTML=orig,2000);
        }
      };

      // Comment toggle
      document.getElementById('commentBtn').onclick = ()=>{
        const sec = document.getElementById('commentsSection');
        sec.style.display = sec.style.display==='none'?'block':'none';
      };
    }

    async function loadComments(){
      try {
        const q = encodeURIComponent(JSON.stringify({method:'equal',attribute:'articleId',values:[articleId]}));
        const res = await fetch(`${ENDPOINT}/databases/${DB}/collections/article_comments/documents?queries[]=${q}&queries[]=${encodeURIComponent(JSON.stringify({method:'orderDesc',attribute:'$createdAt'}))}`,{headers:H}).then(r=>r.json());
        document.getElementById('commentCount').textContent = res.total;
        document.getElementById('commentsList').innerHTML = res.documents.map(c=>`
          <div class="comment">
            <div><span class="comment-author">${c.userName}</span><span class="comment-date">${new Date(c.createdAt).toLocaleDateString()}</span></div>
            <p class="comment-text">${c.comment}</p>
          </div>
        `).join('') || '<p style="color:#999;text-align:center;padding:20px">No comments yet. Be first!</p>';
      } catch(e){}
    }

    async function postComment(){
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if(!text ||!session) return;

      try {
        const me = await fetch(`${ENDPOINT}/account`,{headers:H}).then(r=>r.json());
        await fetch(`${ENDPOINT}/databases/${DB}/collections/article_comments/documents`,{
          method:'POST',
          headers:{...H,'Content-Type':'application/json'},
          body:JSON.stringify({documentId:'unique()',data:{
            articleId, userId:me.$id, userName:me.name||me.email.split('@')[0],
            comment:text, createdAt:new Date().toISOString()
          }})
        });
        input.value='';
        loadComments();
      } catch(e){ alert('Error posting comment'); }
    }

    loadArticle();
  </script>
  <style>@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}</style>
</body>
</html>
