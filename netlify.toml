[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "development" }

[headers]
  [[headers.values]]
    key = "Cache-Control"
    value = "max-age=3600"

[[headers.values]]
  key = "X-Content-Type-Options"
  value = "nosniff"

[[headers.values]]
  key = "X-Frame-Options"
  value = "DENY"

[[headers.values]]
  key = "X-XSS-Protection"
  value = "1; mode=block"

[[headers.values]]
  key = "Referrer-Policy"
  value = "strict-origin-when-cross-origin"
