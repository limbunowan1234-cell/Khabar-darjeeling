name: Generate News Sitemap

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate news-sitemap.xml
        run: node .github/scripts/gen-news-sitemap.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add khabar-darjeeling/news-sitemap.xml
          git diff --staged --quiet || git commit -m "chore: update news sitemap [skip ci]"
          git push
